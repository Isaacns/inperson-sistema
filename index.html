<style>
/* ============================================================
   INPERSON — Identidade Viva · v0.3
   Premium minimalista + LIQUID GLASS + movimento (algo vivo).
   Paleta oficial: fundo #010510, acento azul-aço #74B0D8, texto #FAFAFA.
   ============================================================ */
:root{
  --ip-bg:#010510; --ip-bg-2:#050A16; --ip-surface:#080F1E; --ip-surface-2:#0C1426;
  --ip-border:#15223A; --ip-border-2:#21344E;
  --ip-accent:#74B0D8; --ip-accent-2:#5B9BC4; --ip-accent-dim:rgba(116,176,216,.12);
  --ip-text:#FAFAFA; --ip-muted:#8FA3BE; --ip-faint:#52647F;
  --ip-ok:#5FBF8F; --ip-warn:#D9A441; --ip-danger:#D9655B;
  --ip-radius:16px; --ip-radius-sm:10px;
  --ip-font:"Segoe UI", Inter, system-ui, -apple-system, sans-serif;
  /* liquid glass */
  --glass-bg:linear-gradient(135deg, rgba(124,176,216,.10), rgba(255,255,255,.02));
  --glass-brd:rgba(150,190,225,.16);
  --glass-blur:blur(22px) saturate(150%);
  --glass-shadow:0 10px 36px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14), inset 0 0 30px rgba(116,176,216,.04);
}
*{box-sizing:border-box}
html,body,#root{height:100%}
body{
  margin:0; font-family:var(--ip-font); font-weight:400; color:var(--ip-text);
  background:var(--ip-bg); -webkit-font-smoothing:antialiased; letter-spacing:.2px;
  overflow-x:hidden;
}
a{color:var(--ip-accent);text-decoration:none}
button{font-family:inherit}
h1,h2,h3{font-weight:300}

/* ---------- FUNDO VIVO (aurora + marca d'água) ---------- */
.ip-bgfx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.ip-blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;mix-blend-mode:screen;will-change:transform}
.ip-blob.b1{width:46vw;height:46vw;left:-8vw;top:-10vw;background:radial-gradient(circle,#1f5e8a,transparent 70%);animation:ip-aurora 22s ease-in-out infinite}
.ip-blob.b2{width:40vw;height:40vw;right:-6vw;top:8vh;background:radial-gradient(circle,#0e3a5c,transparent 70%);animation:ip-aurora 28s ease-in-out infinite reverse}
.ip-blob.b3{width:50vw;height:50vw;left:18vw;bottom:-22vw;background:radial-gradient(circle,#14506e,transparent 70%);animation:ip-aurora 34s ease-in-out infinite}
.ip-watermark{position:absolute;right:-4vw;top:50%;transform:translateY(-50%);width:62vh;height:62vh;opacity:.06;animation:ip-breathe 9s ease-in-out infinite;will-change:transform,opacity}
.ip-watermark svg{width:100%;height:100%}
.ip-grain{position:absolute;inset:0;opacity:.5;background-image:radial-gradient(rgba(255,255,255,.025) 1px,transparent 1px);background-size:3px 3px}

@keyframes ip-aurora{0%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,-4%) scale(1.12)}66%{transform:translate(-4%,5%) scale(.94)}100%{transform:translate(0,0) scale(1)}}
@keyframes ip-breathe{0%,100%{transform:translateY(-50%) scale(1);opacity:.05}50%{transform:translateY(-50%) scale(1.05);opacity:.09}}
@keyframes ip-glow{0%,100%{filter:drop-shadow(0 0 5px rgba(116,176,216,.45))}50%{filter:drop-shadow(0 0 20px rgba(116,176,216,.95))}}
@keyframes ip-breathe-soft{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
@keyframes ip-draw{to{stroke-dashoffset:0}}
@keyframes ip-fadeup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes ip-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes ip-shimmer{to{background-position:200% center}}
@keyframes ip-rise{from{transform:translateY(110vh) scale(.6);opacity:0}10%{opacity:.7}100%{transform:translateY(-12vh) scale(1);opacity:0}}
@keyframes ip-spin{to{transform:rotate(360deg)}}
@keyframes ip-pulse-ring{0%{transform:scale(.8);opacity:.7}100%{transform:scale(1.8);opacity:0}}

/* ---------- GLASS ---------- */
.ip-glass{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-brd);box-shadow:var(--glass-shadow)}
.ip-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-brd);border-radius:var(--ip-radius);box-shadow:var(--glass-shadow)}

/* util */
.ip-muted{color:var(--ip-muted)} .ip-faint{color:var(--ip-faint)} .ip-accent{color:var(--ip-accent)}
.ip-rel{position:relative;z-index:1}
.ip-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:.4px;border:1px solid var(--glass-brd);color:var(--ip-muted);background:rgba(255,255,255,.03)}
.ip-btn{position:relative;display:inline-flex;align-items:center;gap:8px;justify-content:center;padding:10px 16px;border-radius:var(--ip-radius-sm);border:1px solid var(--ip-accent);background:linear-gradient(135deg,var(--ip-accent),var(--ip-accent-2));color:#03101c;font-weight:600;letter-spacing:.4px;cursor:pointer;transition:.18s;overflow:hidden}
.ip-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(116,176,216,.35)}
.ip-btn:active{transform:translateY(1px)}
.ip-btn:disabled{opacity:.5;cursor:not-allowed}
.ip-btn.ghost{background:rgba(255,255,255,.04);border-color:var(--glass-brd);color:var(--ip-text);backdrop-filter:blur(8px)}
.ip-btn.ghost:hover{background:rgba(116,176,216,.12);border-color:var(--ip-accent)}
.ip-input{width:100%;padding:12px 14px;border-radius:var(--ip-radius-sm);background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);color:var(--ip-text);font-size:14px;backdrop-filter:blur(8px);transition:.18s}
.ip-input::placeholder{color:var(--ip-faint)}
.ip-input:focus{outline:none;border-color:var(--ip-accent);box-shadow:0 0 0 3px var(--ip-accent-dim)}
.ip-label{font-size:11px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--ip-muted);margin-bottom:6px;display:block}

.st-no_ar,.st-ativo{color:var(--ip-ok)} .dot-no_ar,.dot-ativo{background:var(--ip-ok)}
.st-desenvolvimento{color:var(--ip-accent)} .dot-desenvolvimento{background:var(--ip-accent)}
.st-planejado,.st-prospect{color:var(--ip-muted)} .dot-planejado,.dot-prospect{background:var(--ip-faint)}
.st-manutencao,.st-pausado{color:var(--ip-warn)} .dot-manutencao,.dot-pausado{background:var(--ip-warn)}

/* ---------- LAYOUT ---------- */
.ip-shell{position:relative;z-index:1;display:grid;grid-template-columns:266px 1fr;min-height:100%}
.ip-side{background:linear-gradient(180deg,rgba(8,15,30,.72),rgba(3,8,18,.66));backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);border-right:1px solid var(--glass-brd);padding:22px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.ip-side .brand{padding:6px 8px 16px}
.ip-nav{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:var(--ip-radius-sm);color:var(--ip-muted);font-size:14px;cursor:pointer;border:1px solid transparent;transition:.16s}
.ip-nav:hover{background:rgba(255,255,255,.05);color:var(--ip-text);transform:translateX(2px)}
.ip-nav.active{background:linear-gradient(135deg,rgba(116,176,216,.18),rgba(116,176,216,.05));color:var(--ip-text);border-color:var(--glass-brd)}
.ip-nav.active .ic{color:var(--ip-accent)}
.ip-nav.soon{opacity:.42;cursor:not-allowed}
.ip-nav .ic{width:20px;text-align:center;font-size:15px}
.ip-main{position:relative;z-index:1;padding:28px 34px;max-width:1220px;width:100%}
.ip-view{animation:ip-fadeup .5s ease both}
.ip-topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.ip-h1{font-size:27px;font-weight:300;margin:0;letter-spacing:.5px}
.ip-sub{color:var(--ip-muted);font-size:13px;margin-top:5px}
.ip-eyebrow{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--ip-accent);font-weight:500}

.ip-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.ip-kpi{padding:20px}
.ip-kpi .v{font-size:33px;font-weight:200;line-height:1;letter-spacing:.5px;background:linear-gradient(135deg,#FAFAFA,#9cc6e4);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ip-kpi .l{color:var(--ip-muted);font-size:12px;margin-top:9px;letter-spacing:.3px}

.ip-grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:15px}
.ip-syscard{padding:20px;cursor:pointer;transition:.2s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;gap:11px;min-height:160px}
.ip-syscard:hover{transform:translateY(-5px) scale(1.012);border-color:var(--ip-accent);box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 0 1px var(--ip-accent-dim),inset 0 1px 0 rgba(255,255,255,.16)}
.ip-syscard .ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--glass-brd);background:rgba(255,255,255,.04)}
.ip-syscard .nome{font-weight:400;font-size:16px;letter-spacing:.3px}
.ip-syscard .desc{color:var(--ip-muted);font-size:12.5px;line-height:1.5;flex:1}
.ip-stagger>*{animation:ip-fadeup .5s ease both}
.ip-stagger>*:nth-child(1){animation-delay:.03s}.ip-stagger>*:nth-child(2){animation-delay:.08s}.ip-stagger>*:nth-child(3){animation-delay:.13s}.ip-stagger>*:nth-child(4){animation-delay:.18s}.ip-stagger>*:nth-child(5){animation-delay:.23s}.ip-stagger>*:nth-child(6){animation-delay:.28s}.ip-stagger>*:nth-child(7){animation-delay:.33s}.ip-stagger>*:nth-child(8){animation-delay:.38s}

.ip-list{display:flex;flex-direction:column;gap:10px}
.ip-row{display:flex;gap:15px;align-items:flex-start;padding:15px 17px;transition:.18s}
.ip-row:hover{transform:translateX(3px);border-color:var(--ip-accent)}
.ip-row .when{min-width:84px;text-align:center}
.ip-row .when .d{font-weight:300;font-size:21px;letter-spacing:.5px}
.ip-row .when .m{font-size:10px;color:var(--ip-muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.ip-tag{font-size:10.5px;font-weight:500;letter-spacing:.4px;padding:2px 9px;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid var(--glass-brd);color:var(--ip-muted)}
.ip-venc-prox{border-left:2px solid var(--ip-warn)}
.ip-venc-crit{border-left:2px solid var(--ip-danger)}

.ip-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.ip-seg{display:flex;background:rgba(255,255,255,.03);border:1px solid var(--glass-brd);border-radius:var(--ip-radius-sm);overflow:hidden;backdrop-filter:blur(8px)}
.ip-seg button{padding:8px 13px;background:transparent;border:0;color:var(--ip-muted);cursor:pointer;font-size:12.5px;letter-spacing:.3px;transition:.15s}
.ip-seg button.on{background:var(--ip-accent-dim);color:var(--ip-text)}

/* ---------- LOGIN VIVO ---------- */
.ip-auth{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.ip-auth .box{position:relative;z-index:2;width:100%;max-width:412px;padding:38px 34px;border-radius:22px;animation:ip-fadeup .7s ease both}
.ip-auth-hero{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:22px}
.ip-logo-vivo{animation:ip-glow 4.5s ease-in-out infinite}
.ip-logo-vivo .ring{animation:ip-breathe-soft 4.5s ease-in-out infinite;transform-origin:center}
.ip-logo-vivo .stroke{stroke-dasharray:240;stroke-dashoffset:240;animation:ip-draw 2.4s ease forwards}
.ip-logo-vivo .dot{animation:ip-breathe-soft 3s ease-in-out infinite}
.ip-wordmark{margin-top:16px;font-size:23px;font-weight:300;letter-spacing:9px;color:#FAFAFA}
.ip-wordmark b{font-weight:300;color:var(--ip-accent)}
.ip-tagline{margin-top:7px;font-size:9.5px;letter-spacing:5px;color:var(--ip-accent);text-transform:uppercase}
.ip-particles{position:absolute;inset:0;z-index:1;pointer-events:none}
.ip-particles i{position:absolute;bottom:-10vh;width:4px;height:4px;border-radius:50%;background:var(--ip-accent);opacity:.5;animation:ip-rise linear infinite}
.ip-msg{padding:10px 12px;border-radius:var(--ip-radius-sm);font-size:13px;margin-top:12px}
.ip-msg.err{background:rgba(217,101,91,.12);border:1px solid rgba(217,101,91,.4);color:#E9A39C}
.ip-msg.ok{background:rgba(95,191,143,.12);border:1px solid rgba(95,191,143,.4);color:#A5DCBF}

/* ---------- MODAIS GLASS ---------- */
.ip-modal-bg{position:fixed;inset:0;background:rgba(1,5,16,.62);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;animation:ip-fadeup .25s ease both}
.ip-modal{position:relative;width:100%;max-width:480px;padding:28px;border-radius:20px;animation:ip-fadeup .35s cubic-bezier(.2,.8,.2,1) both}

/* ---------- UPGRADE ---------- */
.ip-upbtn{position:relative;display:inline-flex;align-items:center;gap:9px;padding:10px 18px;border-radius:999px;border:1px solid rgba(180,210,235,.4);color:#eaf4fb;font-weight:600;letter-spacing:.6px;font-size:13px;cursor:pointer;overflow:hidden;background:linear-gradient(110deg,#0d2c45,#175a86,#33b6d8,#175a86,#0d2c45);background-size:220% auto;animation:ip-shimmer 5s linear infinite;box-shadow:0 6px 22px rgba(51,182,216,.3)}
.ip-upbtn:hover{transform:translateY(-1px) scale(1.03);box-shadow:0 10px 30px rgba(51,182,216,.5)}
.ip-upbtn .spark{animation:ip-breathe-soft 2.2s ease-in-out infinite}
.ip-upbtn::after{content:"";position:absolute;inset:0;border-radius:999px;box-shadow:0 0 0 0 rgba(51,182,216,.5);animation:ip-pulse-ring 2.6s ease-out infinite}
.ip-upmodal{max-width:760px;padding:0;overflow:hidden;border-radius:24px}
.ip-uphead{position:relative;padding:30px 30px 22px;text-align:center;overflow:hidden;background:linear-gradient(135deg,rgba(23,90,134,.5),rgba(51,182,216,.18))}
.ip-uphead .orb{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(51,182,216,.55),transparent 65%);filter:blur(20px);top:-120px;left:50%;transform:translateX(-50%);animation:ip-breathe 6s ease-in-out infinite}
.ip-upplans{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:24px 30px 12px}
.ip-plan{padding:22px;border-radius:18px;border:1px solid var(--glass-brd);background:rgba(255,255,255,.03);transition:.2s;position:relative}
.ip-plan:hover{transform:translateY(-4px);border-color:var(--ip-accent);box-shadow:0 14px 34px rgba(0,0,0,.45)}
.ip-plan.pro{border-color:rgba(51,182,216,.5);background:linear-gradient(160deg,rgba(51,182,216,.14),rgba(255,255,255,.02))}
.ip-plan .price{font-size:30px;font-weight:200;margin:8px 0}
.ip-plan ul{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:9px}
.ip-plan li{font-size:13px;color:var(--ip-muted);display:flex;gap:9px;align-items:flex-start;line-height:1.4}
.ip-plan li::before{content:"✦";color:var(--ip-accent);font-size:11px;margin-top:2px}
.ip-upfoot{padding:8px 30px 28px;text-align:center}
.ip-x{position:absolute;top:16px;right:18px;z-index:3;width:34px;height:34px;border-radius:50%;border:1px solid var(--glass-brd);background:rgba(255,255,255,.05);color:var(--ip-text);cursor:pointer;font-size:16px;line-height:1}

.ip-fatal{max-width:620px;margin:60px auto;padding:24px;font-family:var(--ip-font)}
.ip-fatal pre{white-space:pre-wrap;background:var(--ip-bg-2);border:1px solid var(--ip-border-2);padding:14px;border-radius:10px;color:#E9A39C;font-size:12px;overflow:auto}

@media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;animation-iteration-count:1!important}}
@media (max-width:880px){
  .ip-shell{grid-template-columns:1fr}
  .ip-side{position:fixed;left:-300px;transition:.2s;z-index:40}
  .ip-side.open{left:0}
  .ip-kpis{grid-template-columns:repeat(2,1fr)}
  .ip-upplans{grid-template-columns:1fr}
  .ip-mtoggle{display:inline-flex!important}
}
.ip-mtoggle{display:none}

/* ===== v0.4 — logo oficial + bolhas + feixe + sidebar ===== */
.ip-logo-hero{display:block;width:300px;max-width:78%;margin:0 auto 6px;filter:drop-shadow(0 0 14px rgba(116,176,216,.45));animation:ip-glow 5s ease-in-out infinite, ip-breathe-soft 6s ease-in-out infinite;transform-origin:center}
.ip-brand-img{width:200px;max-width:100%;height:auto;filter:drop-shadow(0 0 6px rgba(116,176,216,.25));animation:ip-breathe-soft 7s ease-in-out infinite;transform-origin:left center}
.ip-watermark img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 30px rgba(116,176,216,.25))}
/* feixe de luz cinematografico (poster INPERSON) */
.ip-beam{position:absolute;top:-12vh;right:8vw;width:42vw;height:130vh;background:linear-gradient(170deg, rgba(116,176,216,.16), rgba(116,176,216,.04) 40%, transparent 70%);transform:rotate(14deg);filter:blur(14px);mix-blend-mode:screen;opacity:.7;animation:ip-beam 11s ease-in-out infinite}
@keyframes ip-beam{0%,100%{opacity:.45;transform:rotate(13deg) translateX(0)}50%{opacity:.8;transform:rotate(16deg) translateX(-2vw)}}
/* bolhas de agua subindo */
.ip-particles i.bub{bottom:-12vh;border-radius:50%;background:radial-gradient(circle at 32% 28%, rgba(255,255,255,.55), rgba(116,176,216,.18) 55%, rgba(116,176,216,.04) 75%, transparent 80%);border:1px solid rgba(180,212,236,.28);box-shadow:0 0 8px rgba(116,176,216,.25), inset 0 0 6px rgba(255,255,255,.25);animation-name:ip-bubble!important}
@keyframes ip-bubble{0%{transform:translate(0,0) scale(.7);opacity:0}8%{opacity:.7}50%{transform:translate(12px,-55vh) scale(1)}100%{transform:translate(-10px,-118vh) scale(1.05);opacity:0}}
/* sidebar com rolagem (UPGRADE sempre acessível) */

.ip-side::-webkit-scrollbar{width:6px}.ip-side::-webkit-scrollbar-thumb{background:var(--glass-brd);border-radius:6px}
.ip-navwrap{display:flex;flex-direction:column;gap:4px}
.ip-sidefoot{margin-top:8px;padding-top:14px;border-top:1px solid var(--glass-brd)}
.ip-brand{padding:6px 8px 14px}

/* ===== v0.5 — fundo mais vivo, logo central e visível, bolhas em todas as telas ===== */

.ip-watermark img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 42px rgba(116,176,216,.5))}
@keyframes ip-wm{0%,100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:.10}50%{transform:translate(-51%,-53%) scale(1.07) rotate(2.5deg);opacity:.18}}
.ip-blob{opacity:.62;filter:blur(64px)}
.ip-bubbles{position:absolute;inset:0;z-index:0}
.bub{position:absolute;bottom:-12vh;border-radius:50%;background:radial-gradient(circle at 32% 28%, rgba(255,255,255,.55), rgba(116,176,216,.18) 55%, rgba(116,176,216,.04) 75%, transparent 80%);border:1px solid rgba(180,212,236,.28);box-shadow:0 0 8px rgba(116,176,216,.25), inset 0 0 6px rgba(255,255,255,.25);animation:ip-bubble 12s linear infinite}

<body>
<div id="root">
  <div class="ip-auth"><div class="ip-muted">Carregando o Sistema INPERSON...</div></div>
</div>
<script>
/* ============================================================
   Sistema INPERSON — app v0.4 (sem JSX) — logo oficial + vivo
   ============================================================ */
(function () {
  "use strict";
  var h = React.createElement;
  var useState = React.useState, useEffect = React.useEffect, useCallback = React.useCallback;
  var CFG = window.INPERSON_CONFIG || {};
  var L = window.IP_LOGOS || {};
  var sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY);

  function E(t){ return function(p){ var c=[].slice.call(arguments,1); return h.apply(null,[t,p].concat(c)); }; }
  var div=E("div"), span=E("span"), p=E("p"), button=E("button"), a=E("a"), img=E("img"),
      input=E("input"), form=E("form"), label=E("label"), h1=E("h1"), h2=E("h2"),
      select=E("select"), option=E("option"), textarea=E("textarea"), strong=E("strong");

  var MES=["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
  function parseD(s){ return s ? new Date(s+"T00:00:00") : null; }
  function diasAte(s){ var d=parseD(s); if(!d) return null; return Math.ceil((d-new Date())/86400000); }
  function fmtDia(s){ var d=parseD(s); return d? String(d.getDate()).padStart(2,"0"):"–"; }
  function fmtMesAno(s){ var d=parseD(s); return d? MES[d.getMonth()]+" "+d.getFullYear():"sem prazo"; }
  var CAT_COR={token:"#D9A441",contrato:"#9B8CFF",dominio:"#74B0D8",licenca:"#74B0D8",prazo:"#D9655B",nota:"#8FA3BE",credencial:"#D9A441"};
  var STATUS_LABEL={no_ar:"No ar",desenvolvimento:"Em desenvolvimento",planejado:"Planejado",manutencao:"Manutenção",ativo:"Ativo",prospect:"Prospect",pausado:"Pausado"};

  function Logo(k,cls,style){ return img({src:L[k],alt:"INPERSON",className:cls,style:style,draggable:false}); }
  function BgFx(){
    var bub=[]; for(var i=0;i<28;i++){ var sz=(7+Math.random()*22); bub.push(span({key:i,className:"bub",style:{
      left:(Math.random()*100)+"%", width:sz+"px", height:sz+"px",
      animationDuration:(8+Math.random()*10)+"s", animationDelay:(Math.random()*12)+"s", opacity:.16+Math.random()*.34}})); }
    return div({className:"ip-bgfx"},
      span({className:"ip-blob b1"}), span({className:"ip-blob b2"}), span({className:"ip-blob b3"}),
      div({className:"ip-beam"}),
      div({className:"ip-watermark"}, Logo("mark","",null)),
      div({className:"ip-bubbles"}, bub),
      div({className:"ip-grain"}));
  }
  function pill(status){
    return span({className:"ip-pill st-"+status},
      span({className:"dot-"+status,style:{width:7,height:7,borderRadius:99,display:"inline-block"}}),
      STATUS_LABEL[status]||status);
  }

  /* ===================== LOGIN (VIVO · acesso restrito) ===================== */
  function Auth(){
    var e1=useState(CFG.LOGIN_SUGERIDO||""),email=e1[0],setEmail=e1[1];
    var e2=useState(""),senha=e2[0],setSenha=e2[1];
    var e4=useState(null),msg=e4[0],setMsg=e4[1];
    var e5=useState(false),busy=e5[0],setBusy=e5[1];
    function traduz(m){
      if(/Invalid login/i.test(m)) return "E-mail ou senha inválidos.";
      if(/Email not confirmed/i.test(m)) return "E-mail ainda não confirmado.";
      return m;
    }
    function submit(ev){
      ev.preventDefault(); setBusy(true); setMsg(null);
      sb.auth.signInWithPassword({email:email,password:senha}).then(function(r){
        if(r.error) throw r.error;
      }).catch(function(err){ setMsg({t:"err",m:traduz(err.message||String(err))}); setBusy(false); });
    }
    return div({className:"ip-auth"},
      h(BgFx),
      div({className:"ip-card box ip-rel"},
        div({className:"ip-auth-hero"}, Logo("hero","ip-logo-hero")),
        form({onSubmit:submit,style:{marginTop:6}},
          label({className:"ip-label"},"E-mail"),
          input({className:"ip-input",type:"email",required:true,value:email,onChange:function(e){setEmail(e.target.value);},placeholder:"voce@email.com",style:{marginBottom:12}}),
          label({className:"ip-label"},"Senha"),
          input({className:"ip-input",type:"password",required:true,value:senha,onChange:function(e){setSenha(e.target.value);},placeholder:"••••••••"}),
          msg && div({className:"ip-msg "+msg.t},msg.m),
          button({className:"ip-btn",style:{width:"100%",marginTop:18},disabled:busy}, busy?"Entrando…":"Entrar no Sistema")
        ),
        p({className:"ip-faint",style:{textAlign:"center",marginTop:16,fontSize:11.5,letterSpacing:".5px"}},"🔒 Acesso Restrito")
      )
    );
  }

  /* ===================== DASHBOARD ===================== */
  function Dashboard(props){
    var registros=props.registros, sistemas=props.sistemas, clientes=props.clientes, perfil=props.perfil, go=props.go;
    var noAr=sistemas.filter(function(s){return s.status==="no_ar";}).length;

  /* ===================== AGENDA ===================== */
  function Agenda(props){

    function concluir(r){ sb.from("registros").update({status:r.status==="concluido"?"aberto":"concluido"}).eq("id",r.id).then(reload); }

      div({className:"ip-topbar"},

          div({className:"ip-sub"},"Tokens, contratos, domínios, licenças e prazos — com alerta de vencimento.")),
        button({className:"ip-btn",onClick:function(){setNovo(true);}},"+ Novo registro")),
      div({className:"ip-toolbar"},
        div({className:"ip-seg"}, ["todos","ativos","aberto","concluido"].map(function(st){
          return button({key:st,className:fstatus===st?"on":"",onClick:function(){setFstatus(st);}},st);})),
        div({className:"ip-seg"}, cats.map(function(c){
          return button({key:c,className:fcat===c?"on":"",onClick:function(){setFcat(c);}},c);}))),
      div({className:"ip-list ip-stagger"},
        lista.length===0 && div({className:"ip-card",style:{padding:20}},p({className:"ip-muted",style:{margin:0}},"Nenhum registro com esses filtros.")),
        lista.map(function(r){
          var d=diasAte(r.vence_em);
          var cls=d!==null&&d<=30?"ip-venc-crit":(d!==null&&d<=60?"ip-venc-prox":"");
          return div({key:r.id,className:"ip-card ip-row "+cls},
            div({className:"when"}, div({className:"d"},fmtDia(r.vence_em)), div({className:"m"},fmtMesAno(r.vence_em))),
            div({style:{flex:1}},
              div({style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
                strong({style:{fontWeight:400,textDecoration:r.status==="concluido"?"line-through":"none",opacity:r.status==="concluido"?.6:1}},r.titulo),
                span({className:"ip-tag",style:{color:CAT_COR[r.categoria]||"var(--ip-muted)"}},r.categoria),
                r.prioridade==="critica" && span({className:"ip-tag",style:{color:"var(--ip-danger)"}},"crítica")),
              r.descricao && div({className:"ip-muted",style:{fontSize:12.5,marginTop:4,lineHeight:1.5}},r.descricao),
              div({className:"ip-faint",style:{fontSize:11.5,marginTop:6}},(r.projeto||"—")+(d!==null?(" · "+(d<0?"vencido há "+(-d)+"d":"faltam "+d+"d")):""))),
            button({className:"ip-btn ghost",style:{padding:"7px 12px"},onClick:function(){concluir(r);}},r.status==="concluido"?"Reabrir":"Concluir"));
        })),
      novo && NovoRegistro({onClose:function(){setNovo(false);},onSaved:function(){setNovo(false);reload();}}));
  }
  function NovoRegistro(props){
    var s=useState({titulo:"",categoria:"prazo",projeto:"",descricao:"",vence_em:"",prioridade:"media"}),f=s[0],setF=s[1];
    var b=useState(false),busy=b[0],setBusy=b[1];
    var e=useState(null),err=e[0],setErr=e[1];
    function set(k){ return function(ev){ var n={}; n[k]=ev.target.value; setF(Object.assign({},f,n)); }; }
    function salvar(ev){
      ev.preventDefault(); setBusy(true); setErr(null);
      sb.auth.getUser().then(function(res){
        var user=res.data.user;
        var payload=Object.assign({},f,{owner:user.id,status:"aberto",tipo:"nota",
          alerta_em: f.vence_em ? new Date(parseD(f.vence_em).getTime()-60*86400000).toISOString().slice(0,10) : null});
        if(!payload.vence_em) delete payload.vence_em;
        return sb.from("registros").insert(payload);
      }).then(function(r){ if(r&&r.error) throw r.error; props.onSaved(); })
        .catch(function(x){ setErr(x.message||String(x)); setBusy(false); });
    }
    var campo=function(lbl,node){ return div(null,label({className:"ip-label"},lbl),node); };
    return div({className:"ip-modal-bg",onClick:props.onClose},
      form({className:"ip-card ip-modal",onClick:function(e){e.stopPropagation();},onSubmit:salvar},
        h2({style:{margin:"0 0 4px",fontWeight:300}},"Novo registro"),
        p({className:"ip-sub",style:{marginTop:0}},"Adiciona ao cofre com alerta automático (60 dias antes)."),
        div({style:{marginTop:12}}, campo("Título", input({className:"ip-input",required:true,value:f.titulo,onChange:set("titulo"),placeholder:"Ex.: Renovação domínio inperson.com.br"}))),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}},
          campo("Categoria", select({className:"ip-input",value:f.categoria,onChange:set("categoria")}, ["token","contrato","dominio","licenca","prazo","credencial","nota"].map(function(c){return option({key:c,value:c},c);}))),
          campo("Prioridade", select({className:"ip-input",value:f.prioridade,onChange:set("prioridade")}, ["baixa","media","alta","critica"].map(function(c){return option({key:c,value:c},c);})))),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}},
          campo("Projeto", input({className:"ip-input",value:f.projeto,onChange:set("projeto"),placeholder:"INPERSON / Cliente"})),
          campo("Vence em", input({className:"ip-input",type:"date",value:f.vence_em,onChange:set("vence_em")}))),
        div({style:{marginTop:12}}, campo("Descrição", textarea({className:"ip-input",rows:3,value:f.descricao,onChange:set("descricao"),placeholder:"Detalhes, ação necessária ao vencer…"}))),
        err && div({className:"ip-msg err"},err),
        div({style:{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}},
          button({type:"button",className:"ip-btn ghost",onClick:props.onClose},"Cancelar"),
          button({className:"ip-btn",disabled:busy},busy?"Salvando…":"Salvar registro"))));
  }

  /* ===================== PROJETOS ===================== */
  function Projetos(props){

        div({className:"ip-eyebrow"},"ECOSSISTEMA"),
        h1({className:"ip-h1",style:{marginTop:6}},"Projetos & Softwares"),
        div({className:"ip-sub"},"Clique num card para abrir o sistema / VIZIO Studio."))),
      div({className:"ip-grid-cards ip-stagger"},
        ord.map(function(s){

            div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
              div({className:"ico",style:{color:s.cor||"#74B0D8"}},s.icone||"🧩"),
              s.destaque && span({className:"ip-pill",style:{color:s.cor,borderColor:(s.cor||"#74B0D8")+"55"}},"destaque")),

            div({style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              pill(s.status),
              span({className:"ip-faint",style:{fontSize:11.5}},s.url?"abrir →":"sem URL")));
        })));
  }

  /* ===================== CLIENTES ===================== */
  function Clientes(props){
    var clientes=props.clientes;
    var ord=clientes.slice().sort(function(a,b){return (a.ordem||0)-(b.ordem||0);});
    return div({className:"ip-view"},
      div({className:"ip-topbar"}, div(null,
        div({className:"ip-eyebrow"},"CARTEIRA"),
        h1({className:"ip-h1",style:{marginTop:6}},"Clientes"),
        div({className:"ip-sub"},clientes.length+" clientes · base inicial do CRM."))),
      div({className:"ip-grid-cards ip-stagger"},
        ord.map(function(c){
          return div({key:c.id,className:"ip-card ip-syscard",style:{cursor:"default",minHeight:142}},
            div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},

        })));

  /* ===================== UPGRADE ===================== */
  function UpgradeModal(props){
    function lista(items){ return h("ul",null, items.map(function(t,i){return h("li",{key:i},t);})); }
    return div({className:"ip-modal-bg",onClick:props.onClose},
      div({className:"ip-card ip-upmodal",onClick:function(e){e.stopPropagation();}},
        button({className:"ip-x",onClick:props.onClose},"✕"),
        div({className:"ip-uphead"},
          span({className:"orb"}),
          div({className:"ip-rel"},
            div({className:"ip-eyebrow",style:{textAlign:"center"}},"INPERSON · EVOLUÇÃO"),
            h2({style:{fontWeight:200,fontSize:28,margin:"8px 0 4px",letterSpacing:".5px"}},"Eleve o seu Sistema"),
            p({className:"ip-muted",style:{margin:0,fontSize:13.5}},"Mais automação, inteligência e tempo livre. Escolha como a INPERSON trabalha por você."))),
        div({className:"ip-upplans"},
          div({className:"ip-plan"},
            div({className:"ip-eyebrow"},"PRO"),
            strong({style:{fontWeight:300,fontSize:18}},"INPERSON PRO"),
            div({className:"price"},"R$ —",span({className:"ip-faint",style:{fontSize:13}}," /mês")),
            lista(["Financeiro completo (MRR, fluxo de caixa)","Documentos & contratos no Storage","Relatórios em PDF por área","Multiusuário e permissões"])),
          div({className:"ip-plan pro"},
            span({className:"ip-pill",style:{position:"absolute",top:16,right:16,color:"var(--ip-accent)"}},"recomendado"),
            div({className:"ip-eyebrow"},"IA"),
            strong({style:{fontWeight:300,fontSize:18}},"INPERSON IA"),
            div({className:"price"},"R$ —",span({className:"ip-faint",style:{fontSize:13}}," /mês")),
            lista(["Assistente Claude sobre os seus dados","Briefing diário automático às 6h","Alertas inteligentes de vencimento","Ações por linguagem natural"]))),
        div({className:"ip-upfoot"},

  /* ===================== SHELL ===================== */
  var MODULOS=[
    {id:"dashboard",ic:"🏠",nome:"Início"},
    {id:"agenda",ic:"📅",nome:"Agenda de Registros"},
    {id:"projetos",ic:"🧩",nome:"Projetos & Softwares"},
    {id:"clientes",ic:"👥",nome:"Clientes"},
    {id:"financeiro",ic:"💰",nome:"Financeiro",soon:true},
    {id:"docs",ic:"📁",nome:"Documentos",soon:true},
    {id:"relatorios",ic:"📊",nome:"Relatórios",soon:true},
    {id:"assistente",ic:"🤖",nome:"Assistente IA",soon:true},
    {id:"config",ic:"⚙️",nome:"Configurações",soon:true}
  ];

  function App(){
    var s0=useState(undefined),sessao=s0[0],setSessao=s0[1];
    var s1=useState("dashboard"),view=s1[0],setView=s1[1];
    var s2=useState(null),perfil=s2[0],setPerfil=s2[1];
    var s3=useState([]),registros=s3[0],setRegistros=s3[1];
    var s4=useState([]),sistemas=s4[0],setSistemas=s4[1];
    var s5=useState([]),clientes=s5[0],setClientes=s5[1];
    var s6=useState(false),menu=s6[0],setMenu=s6[1];
    var s7=useState(false),upgrade=s7[0],setUpgrade=s7[1];

    useEffect(function(){
      sb.auth.getSession().then(function(r){ setSessao(r.data.session); });
      var sub=sb.auth.onAuthStateChange(function(_e,sess){ setSessao(sess); });
      return function(){ sub.data.subscription.unsubscribe(); };
    },[]);
    var carregar=useCallback(function(){
      sb.auth.getUser().then(function(res){
        var user=res.data.user; if(!user) return;
        return Promise.all([
          sb.from("perfis").select("*").eq("id",user.id).single(),
          sb.from("registros").select("*"),
          sb.from("sistemas").select("*").order("ordem",{ascending:true}),
          sb.from("clientes").select("*").order("ordem",{ascending:true})

          setSistemas(out[2].data||[]); setClientes(out[3].data||[]);
        });

    },[]);

    if(sessao===undefined) return div({className:"ip-auth"}, h(BgFx), div({className:"ip-rel ip-muted"},"Carregando…"));

    var body;
    if(view==="dashboard") body=Dashboard({registros:registros,sistemas:sistemas,clientes:clientes,perfil:perfil,go:setView});
    else if(view==="agenda") body=Agenda({registros:registros,reload:carregar});
    else if(view==="projetos") body=Projetos({sistemas:sistemas,isAdmin:isAdmin});
    else if(view==="clientes") body=Clientes({clientes:clientes});

            })),
          div({style:{margin:"12px 4px 6px"}},
            button({className:"ip-upbtn",style:{width:"100%"},onClick:function(){setUpgrade(true);}},
              span({className:"spark"},"✦"), "UPGRADE")),
          div({className:"ip-sidefoot"},
            div({style:{padding:"4px 8px"}},
              div({style:{fontSize:13}},perfil?perfil.nome:"—"),
              div({className:"ip-faint",style:{fontSize:11}},perfil?(perfil.role_label||perfil.papel):"")),
            button({className:"ip-btn ghost",style:{width:"100%",marginTop:8},onClick:function(){sb.auth.signOut();}},"Sair"),
            div({className:"ip-faint",style:{fontSize:10,textAlign:"center",marginTop:10,letterSpacing:".5px"}},(CFG.APP_NOME||"Sistema INPERSON")+" · "+(CFG.APP_VERSAO||"")))

  function fatal(msg){
    var r=document.getElementById("root");
    if(r) r.innerHTML='<div class="ip-fatal"><h2 style="font-weight:300">Falha ao carregar o Sistema INPERSON</h2><p class="ip-muted">Detalhes abaixo. Verifique a conexao e recarregue.</p><pre>'+String(msg).replace(/</g,"&lt;")+'</pre></div>';
  }
  window.addEventListener("error",function(e){ if(!document.querySelector(".ip-shell, .ip-auth")) fatal(e.message||e.error||"erro"); });
  try{
    if(!window.React||!window.ReactDOM||!window.supabase) throw new Error("Bibliotecas (React/Supabase) nao carregaram.");
    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  }catch(err){ fatal(err.stack||err.message||err); }
})();

</script>
