<style>
/* ============================================================
   INPERSON — Identidade Viva · v0.3
   Premium minimalista + LIQUID GLASS + movimento (algo vivo).
   Paleta oficial: fundo #010510, acento azul-aço #74B0D8, texto #FAFAFA.
   ============================================================ */
:root{
  --ip-bg:#010510; --ip-bg-2:#050A16; --ip-surface:#080F1E; --ip-surface-2:#0C1426;
  --ip-border:#15223A; --ip-border-2:#21344E;
  --ip-accent:#74B0D8; --ip-accent-2:#5B9BC4; --ip-accent-dim:rgba(116,176,216,.12);
  --ip-text:#FAFAFA; --ip-muted:#8FA3BE; --ip-faint:#52647F;
  --ip-ok:#5FBF8F; --ip-warn:#D9A441; --ip-danger:#D9655B;
  --ip-radius:16px; --ip-radius-sm:10px;
  --ip-font:"Segoe UI", Inter, system-ui, -apple-system, sans-serif;
  /* liquid glass */
  --glass-bg:linear-gradient(135deg, rgba(124,176,216,.10), rgba(255,255,255,.02));
  --glass-brd:rgba(150,190,225,.16);
  --glass-blur:blur(22px) saturate(150%);
  --glass-shadow:0 10px 36px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14), inset 0 0 30px rgba(116,176,216,.04);
}
*{box-sizing:border-box}
html,body,#root{height:100%}
body{
  margin:0; font-family:var(--ip-font); font-weight:400; color:var(--ip-text);
  background:var(--ip-bg); -webkit-font-smoothing:antialiased; letter-spacing:.2px;
  overflow-x:hidden;
}
a{color:var(--ip-accent);text-decoration:none}
button{font-family:inherit}
h1,h2,h3{font-weight:300}

/* ---------- FUNDO VIVO (aurora + marca d'água) ---------- */
.ip-bgfx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.ip-blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;mix-blend-mode:screen;will-change:transform}
.ip-blob.b1{width:46vw;height:46vw;left:-8vw;top:-10vw;background:radial-gradient(circle,#1f5e8a,transparent 70%);animation:ip-aurora 22s ease-in-out infinite}
.ip-blob.b2{width:40vw;height:40vw;right:-6vw;top:8vh;background:radial-gradient(circle,#0e3a5c,transparent 70%);animation:ip-aurora 28s ease-in-out infinite reverse}
.ip-blob.b3{width:50vw;height:50vw;left:18vw;bottom:-22vw;background:radial-gradient(circle,#14506e,transparent 70%);animation:ip-aurora 34s ease-in-out infinite}
.ip-watermark{position:absolute;right:-4vw;top:50%;transform:translateY(-50%);width:62vh;height:62vh;opacity:.06;animation:ip-breathe 9s ease-in-out infinite;will-change:transform,opacity}
.ip-watermark svg{width:100%;height:100%}
.ip-grain{position:absolute;inset:0;opacity:.5;background-image:radial-gradient(rgba(255,255,255,.025) 1px,transparent 1px);background-size:3px 3px}

@keyframes ip-aurora{0%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,-4%) scale(1.12)}66%{transform:translate(-4%,5%) scale(.94)}100%{transform:translate(0,0) scale(1)}}
@keyframes ip-breathe{0%,100%{transform:translateY(-50%) scale(1);opacity:.05}50%{transform:translateY(-50%) scale(1.05);opacity:.09}}
@keyframes ip-glow{0%,100%{filter:drop-shadow(0 0 5px rgba(116,176,216,.45))}50%{filter:drop-shadow(0 0 20px rgba(116,176,216,.95))}}
@keyframes ip-breathe-soft{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
@keyframes ip-draw{to{stroke-dashoffset:0}}
@keyframes ip-fadeup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes ip-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes ip-shimmer{to{background-position:200% center}}
@keyframes ip-rise{from{transform:translateY(110vh) scale(.6);opacity:0}10%{opacity:.7}100%{transform:translateY(-12vh) scale(1);opacity:0}}
@keyframes ip-spin{to{transform:rotate(360deg)}}
@keyframes ip-pulse-ring{0%{transform:scale(.8);opacity:.7}100%{transform:scale(1.8);opacity:0}}

/* ---------- GLASS ---------- */
.ip-glass{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-brd);box-shadow:var(--glass-shadow)}
.ip-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-brd);border-radius:var(--ip-radius);box-shadow:var(--glass-shadow)}

/* util */
.ip-muted{color:var(--ip-muted)} .ip-faint{color:var(--ip-faint)} .ip-accent{color:var(--ip-accent)}
.ip-rel{position:relative;z-index:1}
.ip-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:.4px;border:1px solid var(--glass-brd);color:var(--ip-muted);background:rgba(255,255,255,.03)}
.ip-btn{position:relative;display:inline-flex;align-items:center;gap:8px;justify-content:center;padding:10px 16px;border-radius:var(--ip-radius-sm);border:1px solid var(--ip-accent);background:linear-gradient(135deg,var(--ip-accent),var(--ip-accent-2));color:#03101c;font-weight:600;letter-spacing:.4px;cursor:pointer;transition:.18s;overflow:hidden}
.ip-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(116,176,216,.35)}
.ip-btn:active{transform:translateY(1px)}
.ip-btn:disabled{opacity:.5;cursor:not-allowed}
.ip-btn.ghost{background:rgba(255,255,255,.04);border-color:var(--glass-brd);color:var(--ip-text);backdrop-filter:blur(8px)}
.ip-btn.ghost:hover{background:rgba(116,176,216,.12);border-color:var(--ip-accent)}
.ip-input{width:100%;padding:12px 14px;border-radius:var(--ip-radius-sm);background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);color:var(--ip-text);font-size:14px;backdrop-filter:blur(8px);transition:.18s}
.ip-input::placeholder{color:var(--ip-faint)}
select.ip-input option,.ip-input option{color:#10243a;background:#ffffff}
select.ip-input optgroup{color:#10243a;background:#ffffff}
.ip-input:focus{outline:none;border-color:var(--ip-accent);box-shadow:0 0 0 3px var(--ip-accent-dim)}
.ip-label{font-size:11px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--ip-muted);margin-bottom:6px;display:block}

.st-no_ar,.st-ativo{color:var(--ip-ok)} .dot-no_ar,.dot-ativo{background:var(--ip-ok)}
.st-desenvolvimento{color:var(--ip-accent)} .dot-desenvolvimento{background:var(--ip-accent)}

/* ---------- LAYOUT ---------- */

.ip-main{position:relative;z-index:1;padding:28px 34px;max-width:1220px;width:100%}

.ip-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}

.ip-grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:18px}
.ip-syscard{padding:20px;cursor:pointer;transition:.2s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;gap:11px;min-height:160px}
.ip-syscard:hover{transform:translateY(-5px) scale(1.012);border-color:var(--ip-accent);box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 0 1px var(--ip-accent-dim),inset 0 1px 0 rgba(255,255,255,.16)}
.ip-syscard .ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--glass-brd);background:rgba(255,255,255,.04)}

.ip-stagger>*{animation:ip-fadeup .5s ease both}
.ip-stagger>*:nth-child(1){animation-delay:.03s}.ip-stagger>*:nth-child(2){animation-delay:.08s}.ip-stagger>*:nth-child(3){animation-delay:.13s}.ip-stagger>*:nth-child(4){animation-delay:.18s}.ip-stagger>*:nth-child(5){animation-delay:.23s}.ip-stagger>*:nth-child(6){animation-delay:.28s}.ip-stagger>*:nth-child(7){animation-delay:.33s}.ip-stagger>*:nth-child(8){animation-delay:.38s}

.ip-list{display:flex;flex-direction:column;gap:10px}

/* ---------- LOGIN VIVO ---------- */
.ip-auth{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}

/* ---------- MODAIS GLASS ---------- */
.ip-modal-bg{position:fixed;inset:0;background:rgba(1,5,16,.62);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;overflow-y:auto;animation:ip-fadeup .25s ease both}
.ip-modal{position:relative;width:100%;max-width:480px;max-height:calc(100vh - 40px);overflow-y:auto;padding:28px;border-radius:20px;margin:auto;animation:ip-fadeup .35s cubic-bezier(.2,.8,.2,1) both}

/* ---------- UPGRADE ---------- */
.ip-upbtn{position:relative;display:flex;width:100%;align-items:center;justify-content:center;gap:9px;padding:10px 18px;border-radius:999px;border:1px solid rgba(180,210,235,.4);color:#eaf4fb;font-weight:600;letter-spacing:.6px;font-size:13px;cursor:pointer;overflow:hidden;background:linear-gradient(110deg,#0d2c45,#175a86,#33b6d8,#175a86,#0d2c45);background-size:220% auto;animation:ip-shimmer 5s linear infinite;box-shadow:0 6px 22px rgba(51,182,216,.3)}
.ip-upbtn:hover{transform:translateY(-1px) scale(1.03);box-shadow:0 10px 30px rgba(51,182,216,.5)}
.ip-upbtn .spark{animation:ip-breathe-soft 2.2s ease-in-out infinite}
.ip-upbtn::after{content:"";position:absolute;inset:0;border-radius:999px;box-shadow:0 0 0 0 rgba(51,182,216,.5);animation:ip-pulse-ring 2.6s ease-out infinite}

.ip-fatal{max-width:620px;margin:60px auto;padding:24px;font-family:var(--ip-font)}

/* ===== Relatórios/Documentos — IDENTIDADE CLARA (Padrão 2026) ===== */
.ip-report{background:#FFFFFF;color:#14171F;max-width:840px;margin:0 auto;padding:44px 48px;position:relative;overflow:hidden;border:1px solid #E7EAF0;border-radius:16px;box-shadow:0 12px 44px rgba(20,30,60,.07)}
.ip-rep-corner{position:absolute;border:1.5px solid #2C6BE0;opacity:.15;pointer-events:none}
.ip-rep-corner.tr{top:0;right:0;width:120px;height:120px;border-left:0;border-bottom:0;border-radius:0 0 0 26px}
.ip-rep-corner.bl{bottom:0;left:0;width:108px;height:108px;border-right:0;border-top:0;border-radius:0 26px 0 0}
.ip-rep-head{display:flex;align-items:center;gap:16px;position:relative;z-index:1}
.ip-rep-mark{height:50px;width:auto}
.ip-rep-name{font-weight:300;letter-spacing:7px;font-size:23px;color:#14171F;line-height:1}
.ip-rep-tag{font-size:9px;letter-spacing:3.5px;color:#2C6BE0;text-transform:uppercase;margin-top:5px}
.ip-rep-accent{display:flex;align-items:center;gap:6px;margin:16px 0 18px}
.ip-rep-accent .dt{width:7px;height:7px;border-radius:50%;background:#2C6BE0;flex:none}
.ip-rep-accent .ln{height:1px;flex:1;background:linear-gradient(90deg,#2C6BE0,transparent)}
.ip-rep-eyebrow{font-size:10.5px;letter-spacing:2.4px;color:#2C6BE0;text-transform:uppercase}
.ip-rep-muted{color:#5C6573}
.ip-rep-faint{color:#9098A6}
.ip-rep-box{border:1px solid #E7EAF0;border-radius:12px;padding:16px 18px;background:#F7F9FC}
.ip-rep-foot{border-top:1px solid #EAEDF3;color:#7A828F;font-size:11px;margin-top:28px;padding-top:14px;text-align:center;letter-spacing:.4px}
.ip-rep-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ip-rep-kpi{background:#F7F9FC;border:1px solid #EAEDF3;border-radius:12px;padding:14px}
.ip-rep-kpi .v{font-size:21px;font-weight:300;color:#14171F}
.ip-rep-kpi .l{font-size:11.5px;color:#5C6573;margin-top:4px}
.ip-rep-row{display:flex;justify-content:space-between;padding:9px 2px;border-bottom:1px solid #EEF1F6;font-size:13.5px;color:#14171F}
@media print{ body{background:#fff!important} .ip-report{border:0;box-shadow:none;max-width:100%;border-radius:0;padding:0 8px} }
@media(max-width:760px){ .ip-rep-kpis{grid-template-columns:repeat(2,1fr)} }

/* ===== FAB · Assistente IA flutuante ===== */
.ip-aifab{position:fixed;right:22px;bottom:22px;z-index:70;width:56px;height:56px;border-radius:50%;border:1px solid rgba(116,176,216,.5);background:linear-gradient(135deg,#74B0D8,#5B9BC4);color:#04101f;font-size:22px;line-height:1;cursor:pointer;box-shadow:0 10px 28px rgba(116,176,216,.35);display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s}
.ip-aifab:hover{transform:translateY(-2px) scale(1.04)}
.ip-aifab.on{background:#0b1626;color:var(--ip-accent)}
.ip-aipanel{position:fixed;right:22px;bottom:88px;z-index:70;width:min(430px,92vw);max-height:min(80vh,660px);overflow:auto;background:rgba(6,13,26,.96);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid var(--glass-brd);border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.5);padding:18px;animation:ip-fadeup .25s ease both}
.ip-aipanel-x{position:absolute;top:12px;right:12px;z-index:2;width:30px;height:30px;border-radius:50%;border:1px solid var(--glass-brd);background:rgba(255,255,255,.05);color:var(--ip-muted);cursor:pointer;font-size:13px}
.ip-aipanel-x:hover{color:var(--ip-accent);border-color:var(--ip-accent)}
.ip-aipanel-body .ip-view{padding:0}
@media(max-width:560px){.ip-aipanel{right:10px;left:10px;width:auto;bottom:84px}.ip-aifab{right:16px;bottom:16px}}

/* ===== Arrastar para reordenar ===== */
.ip-drag-h{touch-action:none;cursor:grab}
.ip-drag-h:active{cursor:grabbing}
.ip-dragging{opacity:.55;outline:2px dashed var(--ip-accent);outline-offset:-2px}

/* ===== Ecossistema · organismo vivo ===== */
@keyframes eco-pulse{0%,100%{opacity:.13;transform:scale(1)}50%{opacity:.4;transform:scale(1.35)}}
.eco-halo{animation:eco-pulse 2.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.eco-halo.down{animation-duration:1.05s}

/* ===== Toggle iOS azul INPERSON (padrão de todos os on/off) ===== */
.ip-sw{position:relative;display:inline-flex;align-items:center;cursor:pointer;flex:none;-webkit-tap-highlight-color:transparent}
.ip-sw input{position:absolute;opacity:0;width:0;height:0;margin:0}
.ip-sw .tr{width:44px;height:26px;border-radius:999px;background:var(--ip-border-2);transition:.22s;position:relative;display:inline-block}
.ip-sw .tr::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .22s cubic-bezier(.3,1.5,.5,1);box-shadow:0 1px 3px rgba(0,0,0,.35)}
.ip-sw input:checked + .tr{background:#74B0D8}
.ip-sw input:checked + .tr::after{transform:translateX(18px)}
.ip-sw input:focus-visible + .tr{box-shadow:0 0 0 3px var(--ip-accent-dim)}

/* ===== Menu lateral agrupado (padrão Inovar) ===== */
.ip-navgroup{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ip-faint);font-weight:600;margin:15px 12px 5px;user-select:none}
.ip-navwrap > .ip-navgroup:first-child{margin-top:2px}

/* ===== INPERSON Claro (tema padrão) ===== */
[data-theme="claro"]{
  --ip-bg:#EEF3F9; --ip-bg-2:#E4ECF5; --ip-surface:#FFFFFF; --ip-surface-2:#F5F8FC;
  --ip-border:#DCE5F0; --ip-border-2:#C6D4E4;
  --ip-accent:#3E7FB0; --ip-accent-2:#5B9BC4; --ip-accent-dim:rgba(62,127,176,.12);
  --ip-text:#0C1B33; --ip-muted:#4A5B73; --ip-faint:#8394AB;
  --ip-ok:#2E9E6B; --ip-warn:#C08A1E; --ip-danger:#C6483E;
  --glass-bg:#FFFFFF; --glass-brd:#DCE5F0;
  --glass-shadow:0 8px 24px rgba(12,27,51,.07), inset 0 1px 0 rgba(255,255,255,.6);
}
[data-theme="claro"] body{background:var(--ip-bg)}
[data-theme="claro"] .ip-card,[data-theme="claro"] .ip-glass{backdrop-filter:none;-webkit-backdrop-filter:none;background:var(--glass-bg)}
[data-theme="claro"] .ip-side{background:linear-gradient(180deg,#FFFFFF,#F5F8FC);backdrop-filter:none;-webkit-backdrop-filter:none;border-right:1px solid var(--ip-border)}
[data-theme="claro"] .ip-input{background:#FFFFFF;backdrop-filter:none}
[data-theme="claro"] .ip-btn{color:#FFFFFF}
[data-theme="claro"] .ip-btn.ghost{background:#F0F5FA;color:var(--ip-text);backdrop-filter:none}
[data-theme="claro"] .ip-btn.ghost:hover{background:var(--ip-accent-dim);border-color:var(--ip-accent)}
[data-theme="claro"] .ip-seg{background:#F0F5FA;backdrop-filter:none}
[data-theme="claro"] .ip-nav:hover{background:rgba(12,27,51,.05)}
[data-theme="claro"] .ip-tag,[data-theme="claro"] .ip-pill{background:#EEF3F9}
[data-theme="claro"] .ip-syscard .ico{background:#F0F5FA}
[data-theme="claro"] .ip-plan{background:#FFFFFF}
[data-theme="claro"] .ip-x{background:#F0F5FA;color:var(--ip-text)}
[data-theme="claro"] .ip-sw .tr{background:#C6D4E4}

/* ===== Ecossistema · organismo vivo (veias + respiração) ===== */
@keyframes eco-flow{to{stroke-dashoffset:-24}}
@keyframes eco-brz{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.eco-vein{stroke-dasharray:5 7;animation:eco-flow 1.7s linear infinite}
.eco-nd{transform-box:fill-box;transform-origin:center;animation:eco-brz 3.6s ease-in-out infinite;cursor:pointer}
.eco-nd:hover circle{filter:brightness(1.16)}

/* ===== Ecossistema · galáxia viva ===== */
.ip-gx{position:relative;border-radius:16px;overflow:hidden;background:#02060d;border:1px solid rgba(150,190,225,.12);isolation:isolate}
.ip-gx .neb{position:absolute;border-radius:50%;filter:blur(64px);mix-blend-mode:screen;pointer-events:none}
.ip-gx .n1{width:46%;height:78%;left:-8%;top:4%;background:radial-gradient(circle,rgba(46,150,190,.55),rgba(46,150,190,0) 65%);animation:gx1 26s ease-in-out infinite alternate}
.ip-gx .n2{width:52%;height:80%;right:-10%;top:-14%;background:radial-gradient(circle,rgba(40,84,200,.50),rgba(40,84,200,0) 65%);animation:gx2 32s ease-in-out infinite alternate}
.ip-gx .n3{width:44%;height:66%;left:36%;bottom:-16%;background:radial-gradient(circle,rgba(126,72,190,.38),rgba(126,72,190,0) 66%);animation:gx3 38s ease-in-out infinite alternate}
.ip-gx .n4{width:32%;height:48%;left:14%;bottom:0;background:radial-gradient(circle,rgba(62,207,142,.20),rgba(62,207,142,0) 68%);animation:gx1 30s ease-in-out infinite alternate-reverse}
@keyframes gx1{to{transform:translate(60px,-34px) scale(1.14)}}
@keyframes gx2{to{transform:translate(-52px,44px) scale(1.10)}}
@keyframes gx3{to{transform:translate(38px,-40px) scale(1.16)}}
.ip-gx .band{position:absolute;inset:-20%;background:linear-gradient(105deg,transparent 38%,rgba(150,190,225,.055) 50%,transparent 62%);filter:blur(14px);pointer-events:none;animation:gxb 44s ease-in-out infinite alternate}
@keyframes gxb{to{transform:translateY(26px) rotate(2deg)}}
.ip-gx svg{position:relative;z-index:2;display:block;width:100%}
@keyframes gxtw{0%,100%{opacity:.15}50%{opacity:.95}}
@keyframes gxbr{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
@keyframes gxhl{0%{transform:scale(.82);opacity:.5}100%{transform:scale(1.85);opacity:0}}
@keyframes gxbk{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes gxcm{0%{transform:translate(-120px,-40px);opacity:0}8%{opacity:.9}40%{opacity:0}100%{transform:translate(820px,300px);opacity:0}}
.gx-st{animation:gxtw 3.6s ease-in-out infinite}
.gx-nd{transform-box:fill-box;transform-origin:center;animation:gxbr 5.2s ease-in-out infinite;cursor:pointer}
.gx-nd:hover{filter:brightness(1.18)}
.gx-hl{transform-box:fill-box;transform-origin:center;animation:gxhl 2.8s ease-out infinite}
.gx-bk{animation:gxbk 1.9s ease-in-out infinite}
.gx-cm{animation:gxcm 14s linear infinite}

/* ===== Scroll invisível (mantém a rolagem, esconde a barra) ===== */
*{scrollbar-width:none;-ms-overflow-style:none}
*::-webkit-scrollbar{width:0;height:0;display:none}

/* ===== Barra do usuário (canto superior direito, padrão Inovar) ===== */
.ip-usermenu{display:flex;align-items:center;gap:10px}
.ip-iconbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--glass-brd);background:rgba(255,255,255,.04);color:var(--ip-text);cursor:pointer;font-size:15px;display:inline-flex;align-items:center;justify-content:center;transition:.15s;flex:none}
.ip-iconbtn:hover{background:rgba(116,176,216,.14);border-color:var(--ip-accent)}
[data-theme="claro"] .ip-iconbtn{background:#F0F5FA}
.ip-lock{position:fixed;inset:0;z-index:200;background:rgba(2,6,16,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;animation:ipfade .25s ease}
@keyframes ipfade{from{opacity:0}to{opacity:1}}
.ip-lock-card{width:min(340px,90vw);padding:30px 26px;border-radius:18px;text-align:center;display:flex;flex-direction:column;align-items:center;background:var(--glass-bg);border:1px solid var(--glass-brd);box-shadow:var(--glass-shadow);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur)}
[data-theme="claro"] .ip-lock{background:rgba(210,225,240,.6)}
[data-theme="claro"] .ip-lock-card{background:#fff}
