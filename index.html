<style>
:root{
  --ip-bg:        #010510;
  --ip-bg-2:      #050A16;
  --ip-surface:   #080F1E;
  --ip-surface-2: #0C1426;
  --ip-border:    #15223A;
  --ip-border-2:  #21344E;
  --ip-accent:    #74B0D8;
  --ip-accent-2:  #5B9BC4;
  --ip-accent-dim:rgba(116,176,216,.12);
  --ip-text:      #FAFAFA;
  --ip-muted:     #8FA3BE;
  --ip-faint:     #52647F;
  --ip-ok:    #5FBF8F;
  --ip-warn:  #D9A441;
  --ip-danger:#D9655B;
  --ip-radius:   14px;
  --ip-radius-sm:9px;
  --ip-font: "Segoe UI", Inter, system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box}
html,body,#root{height:100%}
body{
  margin:0; font-family:var(--ip-font); font-weight:400;
  background:
    radial-gradient(1100px 520px at 88% -12%, rgba(116,176,216,.10), transparent 62%),
    radial-gradient(820px 460px at -8% 112%, rgba(116,176,216,.06), transparent 60%),
    var(--ip-bg);
  color:var(--ip-text); -webkit-font-smoothing:antialiased; letter-spacing:.2px;
}
a{color:var(--ip-accent); text-decoration:none}
button{font-family:inherit}
h1,h2,h3{font-weight:300}
.ip-card{background:var(--ip-surface); border:1px solid var(--ip-border); border-radius:var(--ip-radius)}
.ip-muted{color:var(--ip-muted)} .ip-faint{color:var(--ip-faint)}
.ip-accent{color:var(--ip-accent)}
.ip-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:.4px;border:1px solid var(--ip-border-2);color:var(--ip-muted)}
.ip-btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;padding:10px 16px;border-radius:var(--ip-radius-sm);border:1px solid var(--ip-accent);background:var(--ip-accent);color:#03101c;font-weight:600;letter-spacing:.4px;cursor:pointer;transition:.15s}
.ip-btn:hover{background:var(--ip-accent-2);border-color:var(--ip-accent-2)}
.ip-btn:active{transform:translateY(1px)}
.ip-btn:disabled{opacity:.5;cursor:not-allowed}
.ip-btn.ghost{background:transparent;border-color:var(--ip-border-2);color:var(--ip-text)}
.ip-btn.ghost:hover{background:var(--ip-surface-2);border-color:var(--ip-accent)}
.ip-input{width:100%;padding:11px 13px;border-radius:var(--ip-radius-sm);background:var(--ip-bg-2);border:1px solid var(--ip-border-2);color:var(--ip-text);font-size:14px}
.ip-input:focus{outline:none;border-color:var(--ip-accent);box-shadow:0 0 0 3px var(--ip-accent-dim)}
.ip-label{font-size:11px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--ip-muted);margin-bottom:6px;display:block}
.st-no_ar,.st-ativo{color:var(--ip-ok)} .dot-no_ar,.dot-ativo{background:var(--ip-ok)}
.st-desenvolvimento{color:var(--ip-accent)} .dot-desenvolvimento{background:var(--ip-accent)}
.st-planejado,.st-prospect{color:var(--ip-muted)} .dot-planejado,.dot-prospect{background:var(--ip-faint)}

.ip-side{background:linear-gradient(180deg,var(--ip-bg-2),var(--ip-bg));border-right:1px solid var(--ip-border);padding:22px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}

.ip-nav{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:var(--ip-radius-sm);color:var(--ip-muted);font-size:14px;cursor:pointer;border:1px solid transparent;transition:.12s}

.ip-nav.active{background:var(--ip-accent-dim);color:var(--ip-text);border-color:var(--ip-border-2)}

.ip-nav .ic{width:20px;text-align:center;font-size:15px}
.ip-main{padding:30px 34px;max-width:1200px;width:100%}
.ip-topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.ip-h1{font-size:26px;font-weight:300;margin:0;letter-spacing:.5px}
.ip-sub{color:var(--ip-muted);font-size:13px;margin-top:5px;font-weight:400}
.ip-eyebrow{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--ip-accent);font-weight:500}
.ip-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}

.ip-syscard{padding:20px;cursor:pointer;transition:.16s;display:flex;flex-direction:column;gap:11px;min-height:158px}

.ip-syscard .nome{font-weight:400;font-size:16px;letter-spacing:.3px}
.ip-syscard .desc{color:var(--ip-muted);font-size:12.5px;line-height:1.5;flex:1}
.ip-list{display:flex;flex-direction:column;gap:10px}
.ip-row{display:flex;gap:15px;align-items:flex-start;padding:15px 17px}
.ip-row .when{min-width:84px;text-align:center}
.ip-row .when .d{font-weight:300;font-size:20px;letter-spacing:.5px}
.ip-row .when .m{font-size:10px;color:var(--ip-muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.ip-tag{font-size:10.5px;font-weight:500;letter-spacing:.4px;padding:2px 9px;border-radius:6px;background:var(--ip-surface-2);border:1px solid var(--ip-border-2);color:var(--ip-muted)}
.ip-venc-prox{border-left:2px solid var(--ip-warn)}
.ip-venc-crit{border-left:2px solid var(--ip-danger)}
.ip-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.ip-seg{display:flex;background:var(--ip-bg-2);border:1px solid var(--ip-border-2);border-radius:var(--ip-radius-sm);overflow:hidden}
.ip-seg button{padding:8px 13px;background:transparent;border:0;color:var(--ip-muted);cursor:pointer;font-size:12.5px;letter-spacing:.3px}
.ip-seg button.on{background:var(--ip-accent-dim);color:var(--ip-text)}
.ip-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.ip-auth .box{width:100%;max-width:400px;padding:34px}
.ip-msg{padding:10px 12px;border-radius:var(--ip-radius-sm);font-size:13px;margin-top:12px}
.ip-msg.err{background:rgba(217,101,91,.12);border:1px solid rgba(217,101,91,.4);color:#E9A39C}
.ip-msg.ok{background:rgba(95,191,143,.12);border:1px solid rgba(95,191,143,.4);color:#A5DCBF}
.ip-modal-bg{position:fixed;inset:0;background:rgba(1,5,16,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.ip-modal{width:100%;max-width:470px;padding:26px}
.ip-fatal{max-width:620px;margin:60px auto;padding:24px;font-family:var(--ip-font)}
.ip-fatal pre{white-space:pre-wrap;background:var(--ip-bg-2);border:1px solid var(--ip-border-2);padding:14px;border-radius:10px;color:#E9A39C;font-size:12px;overflow:auto}
@media (max-width:880px){
  .ip-shell{grid-template-columns:1fr}
  .ip-side{position:fixed;left:-300px;transition:.2s;z-index:40}
  .ip-side.open{left:0}
  .ip-kpis{grid-template-columns:repeat(2,1fr)}
  .ip-mtoggle{display:inline-flex!important}
}
.ip-mtoggle{display:none}

  /* ===================== DASHBOARD ===================== */
  function Dashboard(props){
    var registros=props.registros, sistemas=props.sistemas, clientes=props.clientes, perfil=props.perfil, go=props.go;

    );
  }

  /* ===================== AGENDA ===================== */
  function Agenda(props){
    var registros=props.registros, reload=props.reload;
    var s1=useState("todos"),fcat=s1[0],setFcat=s1[1];
    var s2=useState("ativos"),fstatus=s2[0],setFstatus=s2[1];
    var s3=useState(false),novo=s3[0],setNovo=s3[1];
    var cats=["todos"].concat(registros.map(function(r){return r.categoria;}).filter(function(v,i,arr){return v&&arr.indexOf(v)===i;}));
    var lista=registros
      .filter(function(r){return fcat==="todos"||r.categoria===fcat;})
      .filter(function(r){return fstatus==="todos"?true:(fstatus==="ativos"?(r.status!=="concluido"&&r.status!=="arquivado"):r.status===fstatus);})
      .slice().sort(function(a,b){var da=a.vence_em?parseD(a.vence_em):null,db=b.vence_em?parseD(b.vence_em):null; if(da&&db)return da-db; if(da)return -1; if(db)return 1; return 0;});

      sb.from("registros").update({status:r.status==="concluido"?"aberto":"concluido"}).eq("id",r.id).then(reload);
    }
    return div(null,
      div({className:"ip-topbar"},

  function NovoRegistro(props){
    var s=useState({titulo:"",categoria:"prazo",projeto:"",descricao:"",vence_em:"",prioridade:"media"}),f=s[0],setF=s[1];
    var b=useState(false),busy=b[0],setBusy=b[1];
    var e=useState(null),err=e[0],setErr=e[1];
    function set(k){ return function(ev){ var n={}; n[k]=ev.target.value; setF(Object.assign({},f,n)); }; }
    function salvar(ev){
      ev.preventDefault(); setBusy(true); setErr(null);
      sb.auth.getUser().then(function(res){
        var user=res.data.user;
        var payload=Object.assign({},f,{owner:user.id,status:"aberto",tipo:"nota",
          alerta_em: f.vence_em ? new Date(parseD(f.vence_em).getTime()-60*86400000).toISOString().slice(0,10) : null});
        if(!payload.vence_em) delete payload.vence_em;
        return sb.from("registros").insert(payload);
      }).then(function(r){ if(r&&r.error) throw r.error; props.onSaved(); })
        .catch(function(x){ setErr(x.message||String(x)); setBusy(false); });
    }
    var campo=function(lbl,node){ return div(null,label({className:"ip-label"},lbl),node); };
    return div({className:"ip-modal-bg",onClick:props.onClose},
      form({className:"ip-card ip-modal",onClick:function(e){e.stopPropagation();},onSubmit:salvar},
        h2({style:{margin:"0 0 4px",fontWeight:300}},"Novo registro"),
        p({className:"ip-sub",style:{marginTop:0}},"Adiciona ao cofre com alerta automático (60 dias antes)."),
        div({style:{marginTop:12}}, campo("Título", input({className:"ip-input",required:true,value:f.titulo,onChange:set("titulo"),placeholder:"Ex.: Renovação domínio inperson.com.br"}))),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}},
          campo("Categoria", select({className:"ip-input",value:f.categoria,onChange:set("categoria")}, ["token","contrato","dominio","licenca","prazo","credencial","nota"].map(function(c){return option({key:c,value:c},c);}))),
          campo("Prioridade", select({className:"ip-input",value:f.prioridade,onChange:set("prioridade")}, ["baixa","media","alta","critica"].map(function(c){return option({key:c,value:c},c);})))),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}},
          campo("Projeto", input({className:"ip-input",value:f.projeto,onChange:set("projeto"),placeholder:"INPERSON / Cliente"})),
          campo("Vence em", input({className:"ip-input",type:"date",value:f.vence_em,onChange:set("vence_em")}))),
        div({style:{marginTop:12}}, campo("Descrição", textarea({className:"ip-input",rows:3,value:f.descricao,onChange:set("descricao"),placeholder:"Detalhes, ação necessária ao vencer…"}))),
        err && div({className:"ip-msg err"},err),
        div({style:{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}},
          button({type:"button",className:"ip-btn ghost",onClick:props.onClose},"Cancelar"),
          button({className:"ip-btn",disabled:busy},busy?"Salvando…":"Salvar registro"))));
  }

  }

    return div({className:"ip-shell"},
      h("aside",{className:"ip-side"+(menu?" open":"")},

        MODULOS.map(function(m){

  /* mount + erro visível */
  function fatal(msg){
    var r=document.getElementById("root");
    if(r) r.innerHTML='<div class="ip-fatal"><h2 style="font-weight:300">Falha ao carregar o Sistema INPERSON</h2>'+
      '<p class="ip-muted">Detalhes técnicos abaixo. Verifique a conexão e recarregue.</p><pre>'+
      String(msg).replace(/</g,"&lt;")+'</pre></div>';

    if(!window.React||!window.ReactDOM||!window.supabase) throw new Error("Bibliotecas (React/Supabase) não carregaram. Sem internet ou CDN bloqueado.");
