<style>
/* ============================================================
   INPERSON — Identidade Viva · v0.3
   Premium minimalista + LIQUID GLASS + movimento (algo vivo).
   Paleta oficial: fundo #010510, acento azul-aço #74B0D8, texto #FAFAFA.
   ============================================================ */
:root{
  --ip-bg:#010510; --ip-bg-2:#050A16; --ip-surface:#080F1E; --ip-surface-2:#0C1426;
  --ip-border:#15223A; --ip-border-2:#21344E;
  --ip-accent:#74B0D8; --ip-accent-2:#5B9BC4; --ip-accent-dim:rgba(116,176,216,.12);
  --ip-text:#FAFAFA; --ip-muted:#8FA3BE; --ip-faint:#52647F;
  --ip-ok:#5FBF8F; --ip-warn:#D9A441; --ip-danger:#D9655B;
  --ip-radius:16px; --ip-radius-sm:10px;
  --ip-font:"Segoe UI", Inter, system-ui, -apple-system, sans-serif;
  /* liquid glass */
  --glass-bg:linear-gradient(135deg, rgba(124,176,216,.10), rgba(255,255,255,.02));
  --glass-brd:rgba(150,190,225,.16);
  --glass-blur:blur(22px) saturate(150%);
  --glass-shadow:0 10px 36px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14), inset 0 0 30px rgba(116,176,216,.04);
}
*{box-sizing:border-box}
html,body,#root{height:100%}
body{
  margin:0; font-family:var(--ip-font); font-weight:400; color:var(--ip-text);
  background:var(--ip-bg); -webkit-font-smoothing:antialiased; letter-spacing:.2px;
  overflow-x:hidden;
}
a{color:var(--ip-accent);text-decoration:none}
button{font-family:inherit}
h1,h2,h3{font-weight:300}

/* ---------- FUNDO VIVO (aurora + marca d'água) ---------- */
.ip-bgfx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.ip-blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;mix-blend-mode:screen;will-change:transform}
.ip-blob.b1{width:46vw;height:46vw;left:-8vw;top:-10vw;background:radial-gradient(circle,#1f5e8a,transparent 70%);animation:ip-aurora 22s ease-in-out infinite}
.ip-blob.b2{width:40vw;height:40vw;right:-6vw;top:8vh;background:radial-gradient(circle,#0e3a5c,transparent 70%);animation:ip-aurora 28s ease-in-out infinite reverse}
.ip-blob.b3{width:50vw;height:50vw;left:18vw;bottom:-22vw;background:radial-gradient(circle,#14506e,transparent 70%);animation:ip-aurora 34s ease-in-out infinite}
.ip-watermark{position:absolute;right:-4vw;top:50%;transform:translateY(-50%);width:62vh;height:62vh;opacity:.06;animation:ip-breathe 9s ease-in-out infinite;will-change:transform,opacity}
.ip-watermark svg{width:100%;height:100%}
.ip-grain{position:absolute;inset:0;opacity:.5;background-image:radial-gradient(rgba(255,255,255,.025) 1px,transparent 1px);background-size:3px 3px}

@keyframes ip-aurora{0%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,-4%) scale(1.12)}66%{transform:translate(-4%,5%) scale(.94)}100%{transform:translate(0,0) scale(1)}}
@keyframes ip-breathe{0%,100%{transform:translateY(-50%) scale(1);opacity:.05}50%{transform:translateY(-50%) scale(1.05);opacity:.09}}
@keyframes ip-glow{0%,100%{filter:drop-shadow(0 0 5px rgba(116,176,216,.45))}50%{filter:drop-shadow(0 0 20px rgba(116,176,216,.95))}}
@keyframes ip-breathe-soft{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
@keyframes ip-draw{to{stroke-dashoffset:0}}
@keyframes ip-fadeup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes ip-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes ip-shimmer{to{background-position:200% center}}
@keyframes ip-rise{from{transform:translateY(110vh) scale(.6);opacity:0}10%{opacity:.7}100%{transform:translateY(-12vh) scale(1);opacity:0}}
@keyframes ip-spin{to{transform:rotate(360deg)}}
@keyframes ip-pulse-ring{0%{transform:scale(.8);opacity:.7}100%{transform:scale(1.8);opacity:0}}

/* ---------- GLASS ---------- */
.ip-glass{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-brd);box-shadow:var(--glass-shadow)}
.ip-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-brd);border-radius:var(--ip-radius);box-shadow:var(--glass-shadow)}

/* util */
.ip-muted{color:var(--ip-muted)} .ip-faint{color:var(--ip-faint)} .ip-accent{color:var(--ip-accent)}
.ip-rel{position:relative;z-index:1}
.ip-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:.4px;border:1px solid var(--glass-brd);color:var(--ip-muted);background:rgba(255,255,255,.03)}
.ip-btn{position:relative;display:inline-flex;align-items:center;gap:8px;justify-content:center;padding:10px 16px;border-radius:var(--ip-radius-sm);border:1px solid var(--ip-accent);background:linear-gradient(135deg,var(--ip-accent),var(--ip-accent-2));color:#03101c;font-weight:600;letter-spacing:.4px;cursor:pointer;transition:.18s;overflow:hidden}
.ip-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(116,176,216,.35)}
.ip-btn:active{transform:translateY(1px)}
.ip-btn:disabled{opacity:.5;cursor:not-allowed}
.ip-btn.ghost{background:rgba(255,255,255,.04);border-color:var(--glass-brd);color:var(--ip-text);backdrop-filter:blur(8px)}
.ip-btn.ghost:hover{background:rgba(116,176,216,.12);border-color:var(--ip-accent)}
.ip-input{width:100%;padding:12px 14px;border-radius:var(--ip-radius-sm);background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);color:var(--ip-text);font-size:14px;backdrop-filter:blur(8px);transition:.18s}
.ip-input::placeholder{color:var(--ip-faint)}
select.ip-input option,.ip-input option{color:#10243a;background:#ffffff}
select.ip-input optgroup{color:#10243a;background:#ffffff}
.ip-input:focus{outline:none;border-color:var(--ip-accent);box-shadow:0 0 0 3px var(--ip-accent-dim)}
.ip-label{font-size:11px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--ip-muted);margin-bottom:6px;display:block}

.st-no_ar,.st-ativo{color:var(--ip-ok)} .dot-no_ar,.dot-ativo{background:var(--ip-ok)}
.st-desenvolvimento{color:var(--ip-accent)} .dot-desenvolvimento{background:var(--ip-accent)}

/* ---------- LAYOUT ---------- */
.ip-shell{position:relative;z-index:1;display:grid;grid-template-columns:266px 1fr;min-height:100%}
.ip-side{background:linear-gradient(180deg,rgba(8,15,30,.72),rgba(3,8,18,.66));backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);border-right:1px solid var(--glass-brd);padding:22px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}

.ip-nav{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:var(--ip-radius-sm);color:var(--ip-muted);font-size:14px;cursor:pointer;border:1px solid transparent;transition:.16s}
.ip-nav:hover{background:rgba(255,255,255,.05);color:var(--ip-text);transform:translateX(2px)}

.ip-nav.active .ic{color:var(--ip-accent)}
.ip-nav.soon{opacity:.42;cursor:not-allowed}
.ip-nav .ic{width:20px;text-align:center;font-size:15px}
.ip-main{position:relative;z-index:1;padding:28px 34px;max-width:1220px;width:100%}
.ip-view{animation:ip-fadeup .5s ease both}
.ip-topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.ip-h1{font-size:27px;font-weight:300;margin:0;letter-spacing:.5px}
.ip-sub{color:var(--ip-muted);font-size:13px;margin-top:5px}
.ip-eyebrow{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--ip-accent);font-weight:500}

.ip-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.ip-kpi{padding:20px}
.ip-kpi .v{font-size:33px;font-weight:200;line-height:1;letter-spacing:.5px;background:linear-gradient(135deg,#FAFAFA,#9cc6e4);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ip-kpi .l{color:var(--ip-muted);font-size:12px;margin-top:9px;letter-spacing:.3px}

.ip-grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:15px}
.ip-syscard{padding:20px;cursor:pointer;transition:.2s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;gap:11px;min-height:160px}
.ip-syscard:hover{transform:translateY(-5px) scale(1.012);border-color:var(--ip-accent);box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 0 1px var(--ip-accent-dim),inset 0 1px 0 rgba(255,255,255,.16)}
.ip-syscard .ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--glass-brd);background:rgba(255,255,255,.04)}
.ip-syscard .nome{font-weight:400;font-size:16px;letter-spacing:.3px}
.ip-syscard .desc{color:var(--ip-muted);font-size:12.5px;line-height:1.5;flex:1}
.ip-stagger>*{animation:ip-fadeup .5s ease both}
.ip-stagger>*:nth-child(1){animation-delay:.03s}.ip-stagger>*:nth-child(2){animation-delay:.08s}.ip-stagger>*:nth-child(3){animation-delay:.13s}.ip-stagger>*:nth-child(4){animation-delay:.18s}.ip-stagger>*:nth-child(5){animation-delay:.23s}.ip-stagger>*:nth-child(6){animation-delay:.28s}.ip-stagger>*:nth-child(7){animation-delay:.33s}.ip-stagger>*:nth-child(8){animation-delay:.38s}

.ip-list{display:flex;flex-direction:column;gap:10px}
.ip-row{display:flex;gap:15px;align-items:flex-start;padding:15px 17px;transition:.18s}
.ip-row:hover{transform:translateX(3px);border-color:var(--ip-accent)}
.ip-row .when{min-width:84px;text-align:center}
.ip-row .when .d{font-weight:300;font-size:21px;letter-spacing:.5px}
.ip-row .when .m{font-size:10px;color:var(--ip-muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.ip-tag{font-size:10.5px;font-weight:500;letter-spacing:.4px;padding:2px 9px;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid var(--glass-brd);color:var(--ip-muted)}
.ip-venc-prox{border-left:2px solid var(--ip-warn)}
.ip-venc-crit{border-left:2px solid var(--ip-danger)}

.ip-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.ip-seg{display:flex;background:rgba(255,255,255,.03);border:1px solid var(--glass-brd);border-radius:var(--ip-radius-sm);overflow:hidden;backdrop-filter:blur(8px)}
.ip-seg button{padding:8px 13px;background:transparent;border:0;color:var(--ip-muted);cursor:pointer;font-size:12.5px;letter-spacing:.3px;transition:.15s}
.ip-seg button.on{background:var(--ip-accent-dim);color:var(--ip-text)}

/* ---------- LOGIN VIVO ---------- */
.ip-auth{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.ip-auth .box{position:relative;z-index:2;width:100%;max-width:412px;padding:38px 34px;border-radius:22px;animation:ip-fadeup .7s ease both}
.ip-auth-hero{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:22px}
.ip-logo-vivo{animation:ip-glow 4.5s ease-in-out infinite}
.ip-logo-vivo .ring{animation:ip-breathe-soft 4.5s ease-in-out infinite;transform-origin:center}
.ip-logo-vivo .stroke{stroke-dasharray:240;stroke-dashoffset:240;animation:ip-draw 2.4s ease forwards}
.ip-logo-vivo .dot{animation:ip-breathe-soft 3s ease-in-out infinite}

.ip-tagline{margin-top:7px;font-size:9.5px;letter-spacing:5px;color:var(--ip-accent);text-transform:uppercase}
.ip-particles{position:absolute;inset:0;z-index:1;pointer-events:none}
.ip-particles i{position:absolute;bottom:-10vh;width:4px;height:4px;border-radius:50%;background:var(--ip-accent);opacity:.5;animation:ip-rise linear infinite}
.ip-msg{padding:10px 12px;border-radius:var(--ip-radius-sm);font-size:13px;margin-top:12px}
.ip-msg.err{background:rgba(217,101,91,.12);border:1px solid rgba(217,101,91,.4);color:#E9A39C}
.ip-msg.ok{background:rgba(95,191,143,.12);border:1px solid rgba(95,191,143,.4);color:#A5DCBF}

/* ---------- MODAIS GLASS ---------- */
.ip-modal-bg{position:fixed;inset:0;background:rgba(1,5,16,.62);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;overflow-y:auto;animation:ip-fadeup .25s ease both}
.ip-modal{position:relative;width:100%;max-width:480px;max-height:calc(100vh - 40px);overflow-y:auto;padding:28px;border-radius:20px;margin:auto;animation:ip-fadeup .35s cubic-bezier(.2,.8,.2,1) both}

/* ---------- UPGRADE ---------- */
.ip-upbtn{position:relative;display:flex;width:100%;align-items:center;justify-content:center;gap:9px;padding:10px 18px;border-radius:999px;border:1px solid rgba(180,210,235,.4);color:#eaf4fb;font-weight:600;letter-spacing:.6px;font-size:13px;cursor:pointer;overflow:hidden;background:linear-gradient(110deg,#0d2c45,#175a86,#33b6d8,#175a86,#0d2c45);background-size:220% auto;animation:ip-shimmer 5s linear infinite;box-shadow:0 6px 22px rgba(51,182,216,.3)}
.ip-upbtn:hover{transform:translateY(-1px) scale(1.03);box-shadow:0 10px 30px rgba(51,182,216,.5)}
.ip-upbtn .spark{animation:ip-breathe-soft 2.2s ease-in-out infinite}
.ip-upbtn::after{content:"";position:absolute;inset:0;border-radius:999px;box-shadow:0 0 0 0 rgba(51,182,216,.5);animation:ip-pulse-ring 2.6s ease-out infinite}
.ip-upmodal{max-width:760px;padding:0;overflow:hidden;border-radius:24px}
.ip-uphead{position:relative;padding:30px 30px 22px;text-align:center;overflow:hidden;background:linear-gradient(135deg,rgba(23,90,134,.5),rgba(51,182,216,.18))}
.ip-uphead .orb{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(51,182,216,.55),transparent 65%);filter:blur(20px);top:-120px;left:50%;transform:translateX(-50%);animation:ip-breathe 6s ease-in-out infinite}
.ip-upplans{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:24px 30px 12px}
.ip-plan{padding:22px;border-radius:18px;border:1px solid var(--glass-brd);background:rgba(255,255,255,.03);transition:.2s;position:relative}
.ip-plan:hover{transform:translateY(-4px);border-color:var(--ip-accent);box-shadow:0 14px 34px rgba(0,0,0,.45)}
.ip-plan.pro{border-color:rgba(51,182,216,.5);background:linear-gradient(160deg,rgba(51,182,216,.14),rgba(255,255,255,.02))}
.ip-plan .price{font-size:30px;font-weight:200;margin:8px 0}
.ip-plan ul{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:9px}
.ip-plan li{font-size:13px;color:var(--ip-muted);display:flex;gap:9px;align-items:flex-start;line-height:1.4}
.ip-plan li::before{content:"✦";color:var(--ip-accent);font-size:11px;margin-top:2px}
.ip-upfoot{padding:8px 30px 28px;text-align:center}
.ip-x{position:absolute;top:16px;right:18px;z-index:3;width:34px;height:34px;border-radius:50%;border:1px solid var(--glass-brd);background:rgba(255,255,255,.05);color:var(--ip-text);cursor:pointer;font-size:16px;line-height:1}

.ip-fatal{max-width:620px;margin:60px auto;padding:24px;font-family:var(--ip-font)}
.ip-fatal pre{white-space:pre-wrap;background:var(--ip-bg-2);border:1px solid var(--ip-border-2);padding:14px;border-radius:10px;color:#E9A39C;font-size:12px;overflow:auto}

@media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;animation-iteration-count:1!important}}
@media (max-width:880px){
  .ip-shell{grid-template-columns:1fr}
  .ip-side{position:fixed;left:-300px;transition:.2s;z-index:40}
  .ip-side.open{left:0}
  .ip-kpis{grid-template-columns:repeat(2,1fr)}
  .ip-upplans{grid-template-columns:1fr}
  .ip-mtoggle{display:inline-flex!important}
}

   AURA — autenticidade · presença · impacto · energia elevada

.ip-aura{position:fixed;left:50%;top:35%;width:540px;height:540px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;background:radial-gradient(circle, rgba(116,176,216,.14), rgba(116,176,216,.045) 42%, transparent 64%);mix-blend-mode:screen;transition:left .28s cubic-bezier(.2,.8,.2,1), top .28s cubic-bezier(.2,.8,.2,1);filter:blur(6px);will-change:left,top}

.ip-rep-foot{border-top:1px solid #EAEDF3;color:#7A828F;font-size:11px;margin-top:28px;padding-top:14px;text-align:center;letter-spacing:.4px}
.ip-rep-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ip-rep-kpi{background:#F7F9FC;border:1px solid #EAEDF3;border-radius:12px;padding:14px}
.ip-rep-kpi .v{font-size:21px;font-weight:300;color:#14171F}
.ip-rep-kpi .l{font-size:11.5px;color:#5C6573;margin-top:4px}
.ip-rep-row{display:flex;justify-content:space-between;padding:9px 2px;border-bottom:1px solid #EEF1F6;font-size:13.5px;color:#14171F}
@media print{ body{background:#fff!important} .ip-report{border:0;box-shadow:none;max-width:100%;border-radius:0;padding:0 8px} }
@media(max-width:760px){ .ip-rep-kpis{grid-template-columns:repeat(2,1fr)} }

/* ===== FAB · Assistente IA flutuante ===== */
.ip-aifab{position:fixed;right:22px;bottom:22px;z-index:70;width:56px;height:56px;border-radius:50%;border:1px solid rgba(116,176,216,.5);background:linear-gradient(135deg,#74B0D8,#5B9BC4);color:#04101f;font-size:22px;line-height:1;cursor:pointer;box-shadow:0 10px 28px rgba(116,176,216,.35);display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s}
.ip-aifab:hover{transform:translateY(-2px) scale(1.04)}
.ip-aifab.on{background:#0b1626;color:var(--ip-accent)}
.ip-aipanel{position:fixed;right:22px;bottom:88px;z-index:70;width:min(430px,92vw);max-height:min(80vh,660px);overflow:auto;background:rgba(6,13,26,.96);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid var(--glass-brd);border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.5);padding:18px;animation:ip-fadeup .25s ease both}
.ip-aipanel-x{position:absolute;top:12px;right:12px;z-index:2;width:30px;height:30px;border-radius:50%;border:1px solid var(--glass-brd);background:rgba(255,255,255,.05);color:var(--ip-muted);cursor:pointer;font-size:13px}
.ip-aipanel-x:hover{color:var(--ip-accent);border-color:var(--ip-accent)}
.ip-aipanel-body .ip-view{padding:0}
@media(max-width:560px){.ip-aipanel{right:10px;left:10px;width:auto;bottom:84px}.ip-aifab{right:16px;bottom:16px}}

/* ===== Arrastar para reordenar ===== */
.ip-drag-h{touch-action:none;cursor:grab}
.ip-drag-h:active{cursor:grabbing}
.ip-dragging{opacity:.55;outline:2px dashed var(--ip-accent);outline-offset:-2px}

/* ===== Ecossistema · organismo vivo ===== */
@keyframes eco-pulse{0%,100%{opacity:.13;transform:scale(1)}50%{opacity:.4;transform:scale(1.35)}}
.eco-halo{animation:eco-pulse 2.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.eco-halo.down{animation-duration:1.05s}

/* ===== Toggle iOS azul INPERSON (padrão de todos os on/off) ===== */
.ip-sw{position:relative;display:inline-flex;align-items:center;cursor:pointer;flex:none;-webkit-tap-highlight-color:transparent}
.ip-sw input{position:absolute;opacity:0;width:0;height:0;margin:0}
.ip-sw .tr{width:44px;height:26px;border-radius:999px;background:var(--ip-border-2);transition:.22s;position:relative;display:inline-block}
.ip-sw .tr::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .22s cubic-bezier(.3,1.5,.5,1);box-shadow:0 1px 3px rgba(0,0,0,.35)}
.ip-sw input:checked + .tr{background:#74B0D8}
.ip-sw input:checked + .tr::after{transform:translateX(18px)}
.ip-sw input:focus-visible + .tr{box-shadow:0 0 0 3px var(--ip-accent-dim)}

/* ===== Menu lateral agrupado (padrão Inovar) ===== */
.ip-navgroup{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ip-faint);font-weight:600;margin:15px 12px 5px;user-select:none}
.ip-navwrap > .ip-navgroup:first-child{margin-top:2px}

/* ===== INPERSON Claro (tema padrão) ===== */
[data-theme="claro"]{
  --ip-bg:#EEF3F9; --ip-bg-2:#E4ECF5; --ip-surface:#FFFFFF; --ip-surface-2:#F5F8FC;
  --ip-border:#DCE5F0; --ip-border-2:#C6D4E4;
  --ip-accent:#3E7FB0; --ip-accent-2:#5B9BC4; --ip-accent-dim:rgba(62,127,176,.12);
  --ip-text:#0C1B33; --ip-muted:#4A5B73; --ip-faint:#8394AB;
  --ip-ok:#2E9E6B; --ip-warn:#C08A1E; --ip-danger:#C6483E;
  --glass-bg:#FFFFFF; --glass-brd:#DCE5F0;
  --glass-shadow:0 8px 24px rgba(12,27,51,.07), inset 0 1px 0 rgba(255,255,255,.6);
}
[data-theme="claro"] body{background:var(--ip-bg)}
[data-theme="claro"] .ip-card,[data-theme="claro"] .ip-glass{backdrop-filter:none;-webkit-backdrop-filter:none;background:var(--glass-bg)}
[data-theme="claro"] .ip-side{background:linear-gradient(180deg,#FFFFFF,#F5F8FC);backdrop-filter:none;-webkit-backdrop-filter:none;border-right:1px solid var(--ip-border)}
[data-theme="claro"] .ip-input{background:#FFFFFF;backdrop-filter:none}
[data-theme="claro"] .ip-btn{color:#FFFFFF}
[data-theme="claro"] .ip-btn.ghost{background:#F0F5FA;color:var(--ip-text);backdrop-filter:none}
[data-theme="claro"] .ip-btn.ghost:hover{background:var(--ip-accent-dim);border-color:var(--ip-accent)}
[data-theme="claro"] .ip-seg{background:#F0F5FA;backdrop-filter:none}
[data-theme="claro"] .ip-nav:hover{background:rgba(12,27,51,.05)}
[data-theme="claro"] .ip-tag,[data-theme="claro"] .ip-pill{background:#EEF3F9}
[data-theme="claro"] .ip-syscard .ico{background:#F0F5FA}
[data-theme="claro"] .ip-plan{background:#FFFFFF}
[data-theme="claro"] .ip-x{background:#F0F5FA;color:var(--ip-text)}
[data-theme="claro"] .ip-sw .tr{background:#C6D4E4}

/* ===== Ecossistema · organismo vivo (veias + respiração) ===== */
@keyframes eco-flow{to{stroke-dashoffset:-24}}
@keyframes eco-brz{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.eco-vein{stroke-dasharray:5 7;animation:eco-flow 1.7s linear infinite}
.eco-nd{transform-box:fill-box;transform-origin:center;animation:eco-brz 3.6s ease-in-out infinite;cursor:pointer}
.eco-nd:hover circle{filter:brightness(1.16)}

(function () {
  "use strict";
  var h = React.createElement;
  var useState = React.useState, useEffect = React.useEffect, useCallback = React.useCallback;
  var CFG = window.INPERSON_CONFIG || {};
  var L = window.IP_LOGOS || {};
  var BRAND = window.IP_BRAND || {};
  var sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY, {auth:{storage:window.sessionStorage, persistSession:true, autoRefreshToken:true, detectSessionInUrl:false}});
  var IP_STANDALONE = (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone===true;

  function E(t){ return function(p){ var c=[].slice.call(arguments,1); return h.apply(null,[t,p].concat(c)); }; }
  var div=E("div"), span=E("span"), p=E("p"), button=E("button"), a=E("a"), img=E("img"),
      input=E("input"), form=E("form"), label=E("label"), h1=E("h1"), h2=E("h2"), h3=E("h3"),
      select=E("select"), option=E("option"), textarea=E("textarea"), strong=E("strong");

  var MES=["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
  function parseD(s){ return s ? new Date(s+"T00:00:00") : null; }
  function diasAte(s){ var d=parseD(s); if(!d) return null; return Math.ceil((d-new Date())/86400000); }
  function fmtDia(s){ var d=parseD(s); return d? String(d.getDate()).padStart(2,"0"):"–"; }
  function fmtMesAno(s){ var d=parseD(s); return d? MES[d.getMonth()]+" "+d.getFullYear():"sem prazo"; }
  function money(n){ return "R$ "+(Number(n)||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }
  var CAT_COR={token:"#D9A441",contrato:"#9B8CFF",dominio:"#74B0D8",licenca:"#74B0D8",prazo:"#D9655B",nota:"#8FA3BE",credencial:"#D9A441"};
  var STATUS_LABEL={no_ar:"No ar",desenvolvimento:"Em desenvolvimento",planejado:"Planejado",manutencao:"Manutenção",ativo:"Ativo",prospect:"Prospect",pausado:"Pausado"};

  function Logo(k,cls,style){ return img({src:L[k],alt:"INPERSON",className:cls,style:style,draggable:false}); }
  function PasswordInput(props){
    var st=useState(false),show=st[0],setShow=st[1];
    var ip=Object.assign({},props,{type:show?"text":"password",style:Object.assign({width:"100%",paddingRight:"42px"},props.style||{})});
    return div({style:{position:"relative"}},
      input(ip),
      span({onClick:function(){setShow(!show);},title:show?"Ocultar senha":"Mostrar senha",
        style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",fontSize:15,opacity:.7,userSelect:"none"}}, show?"🙈":"👁️"));
  }
  function useCanInstall(){
    var s=useState(!!window.IP_CANINSTALL && !IP_STANDALONE),can=s[0],setCan=s[1];
    useEffect(function(){ function u(){ setCan(!!window.IP_CANINSTALL && !IP_STANDALONE); } window.addEventListener("ip-installchange",u); return function(){ window.removeEventListener("ip-installchange",u); }; },[]);
    return can;
  }
  function bgRef(cv){
    if(!cv || cv._ip) return; cv._ip=true;
    var ctx=cv.getContext("2d");
    var ACC=[116,176,216];
    var W,H,DPR=Math.min(window.devicePixelRatio||1,2);
    var particles=[], MONO=[], t=0;
    var mouse={x:-9999,y:-9999,active:false};
    function rand(a,b){ return a+Math.random()*(b-a); }
    function seedMono(){
      MONO=[]; var cx=W*0.5, cy=H*0.46, s=Math.min(W,H)*0.5;
      var strokes=[
        [[-0.18,-0.12],[-0.18,0.20]],
        [[-0.18,-0.22],[-0.18,-0.18]],
        [[0.04,-0.12],[0.04,0.20]],
        [[0.04,-0.12],[0.20,-0.08]],[[0.20,-0.08],[0.24,0.00]],[[0.24,0.00],[0.20,0.08]],[[0.20,0.08],[0.04,0.10]]
      ];
      strokes.forEach(function(sg){ var n=7; for(var i=0;i<=n;i++){
        var x=sg[0][0]+(sg[1][0]-sg[0][0])*(i/n), y=sg[0][1]+(sg[1][1]-sg[0][1])*(i/n);
        MONO.push({x:cx+x*s, y:cy+y*s}); } });
    }
    function init(){
      W=cv.clientWidth||window.innerWidth; H=cv.clientHeight||window.innerHeight;
      cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
      seedMono();
      particles=[]; var n=Math.round((W*H)/13000); n=Math.max(70,Math.min(150,n));
      for(var i=0;i<n;i++){ var depth=rand(0.35,1);
        particles.push({ x:rand(0,W), y:rand(0,H), vx:rand(-0.12,0.12)*depth, vy:rand(-0.12,0.12)*depth,
          r:rand(0.6,2.2)*depth, depth:depth, base:rand(0.18,0.5), phase:rand(0,6.28), home:null }); }
      var cap=Math.min(MONO.length, Math.floor(particles.length*0.4));
      for(var k=0;k<cap;k++){
        particles[k].home=MONO[k]; particles[k].x=MONO[k].x+rand(-6,6); particles[k].y=MONO[k].y+rand(-6,6); particles[k].r=rand(1.0,1.9); }
    }
    function draw(){
      if(!cv.isConnected) return;
      t+=0.006; ctx.clearRect(0,0,W,H);
      var breathe=0.78+0.22*Math.sin(t*1.1);
      var px=(mouse.active?(mouse.x-W/2):0), py=(mouse.active?(mouse.y-H/2):0);
      var i,a,b,j;
      for(i=0;i<particles.length;i++){ var p=particles[i];
        if(p.home){ p.x+=(p.home.x-p.x)*0.012; p.y+=(p.home.y-p.y)*0.012; p.x+=Math.sin(t+p.phase)*0.18; p.y+=Math.cos(t*0.9+p.phase)*0.18; }
        else { p.x+=p.vx; p.y+=p.vy; if(p.x<-20)p.x=W+20; if(p.x>W+20)p.x=-20; if(p.y<-20)p.y=H+20; if(p.y>H+20)p.y=-20; }
        if(mouse.active){ var dxa=mouse.x-p.x, dya=mouse.y-p.y, d2=dxa*dxa+dya*dya; if(d2<28000){ var f=(1-d2/28000)*0.6; p.x+=dxa*0.004*f; p.y+=dya*0.004*f; } }
      }
      for(a=0;a<particles.length;a++){ var pa=particles[a];
        var ax=pa.x+px*(pa.depth-0.65)*0.04, ay=pa.y+py*(pa.depth-0.65)*0.04;
        for(b=a+1;b<particles.length;b++){ var pb=particles[b];
          var bx=pb.x+px*(pb.depth-0.65)*0.04, by=pb.y+py*(pb.depth-0.65)*0.04;
          var ex=ax-bx, ey=ay-by, dd=ex*ex+ey*ey;
          if(dd<14400){ var al=(1-dd/14400)*0.16*breathe;
            ctx.strokeStyle="rgba("+ACC[0]+","+ACC[1]+","+ACC[2]+","+al.toFixed(3)+")"; ctx.lineWidth=0.6;
            ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke(); } }
      }
      for(j=0;j<particles.length;j++){ var q=particles[j];
        var qx=q.x+px*(q.depth-0.65)*0.04, qy=q.y+py*(q.depth-0.65)*0.04;
        var tw=0.6+0.4*Math.sin(t*2+q.phase), near=0;
        if(mouse.active){ var mdx=mouse.x-qx, mdy=mouse.y-qy, md2=mdx*mdx+mdy*mdy; if(md2<40000) near=(1-md2/40000); }
        var alpha=Math.min(1,(q.base*breathe*tw)+near*0.55);
        if(q.r>1.3 || near>0.2){ var rg=ctx.createRadialGradient(qx,qy,0,qx,qy,q.r*6);
          rg.addColorStop(0,"rgba("+ACC[0]+","+ACC[1]+","+ACC[2]+","+(alpha*0.5).toFixed(3)+")");
          rg.addColorStop(1,"rgba("+ACC[0]+","+ACC[1]+","+ACC[2]+",0)");
          ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(qx,qy,q.r*6,0,6.2832); ctx.fill(); }
        ctx.fillStyle="rgba(220,238,252,"+alpha.toFixed(3)+")"; ctx.beginPath(); ctx.arc(qx,qy,q.r,0,6.2832); ctx.fill();
        if(near>0.15){ ctx.strokeStyle="rgba("+ACC[0]+","+ACC[1]+","+ACC[2]+","+(near*0.4).toFixed(3)+")"; ctx.lineWidth=0.7;
          ctx.beginPath(); ctx.moveTo(qx,qy); ctx.lineTo(mouse.x,mouse.y); ctx.stroke(); }
      }
      if(mouse.active){ var hg=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,220);
        hg.addColorStop(0,"rgba("+ACC[0]+","+ACC[1]+","+ACC[2]+",0.10)");
        hg.addColorStop(1,"rgba("+ACC[0]+","+ACC[1]+","+ACC[2]+",0)");
        ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(mouse.x,mouse.y,220,0,6.2832); ctx.fill(); }
      requestAnimationFrame(draw);
    }
    window.addEventListener("resize",init);
    window.addEventListener("mousemove",function(e){ mouse.x=e.clientX; mouse.y=e.clientY; mouse.active=true; });
    window.addEventListener("mouseleave",function(){ mouse.active=false; mouse.x=-9999; mouse.y=-9999; });
    init(); draw();
  }

  function BgFx(){
    return div({className:"ip-bgfx"},
      h("canvas",{className:"ip-rain",ref:bgRef}));
  }

    return span({className:"ip-pill st-"+status},

  }

  /* ===================== LOGIN ===================== */
  function Auth(){
    var e1=useState(CFG.LOGIN_SUGERIDO||""),email=e1[0],setEmail=e1[1];
    var e2=useState(""),senha=e2[0],setSenha=e2[1];
    var e4=useState(null),msg=e4[0],setMsg=e4[1];
    var e5=useState(false),busy=e5[0],setBusy=e5[1];
    var canInstall=useCanInstall();
    function traduz(m){ if(/Invalid login/i.test(m)) return "E-mail ou senha inválidos."; if(/Email not confirmed/i.test(m)) return "E-mail ainda não confirmado."; return m; }
    function submit(ev){ ev.preventDefault(); setBusy(true); setMsg(null);
      sb.auth.signInWithPassword({email:email,password:senha}).then(function(r){ if(r.error) throw r.error; })

      h(AiFab,{open:aiOpen,setOpen:setAiOpen,P:P}));
  }

  function fatal(msg){ var r=document.getElementById("root"); if(r) r.innerHTML='<div class="ip-fatal"><h2 style="font-weight:300">Falha ao carregar</h2><pre>'+String(msg).replace(/</g,"&lt;")+'</pre></div>'; }
  function auraInit(){ if(document.querySelector(".ip-aura")) return; var el=document.createElement("div"); el.className="ip-aura"; document.body.appendChild(el); var raf=0,cx=innerWidth/2,cy=innerHeight*0.35; window.addEventListener("mousemove",function(e){ cx=e.clientX; cy=e.clientY; if(!raf){ raf=requestAnimationFrame(function(){ el.style.left=cx+"px"; el.style.top=cy+"px"; raf=0; }); } }); }
  var deferredPrompt=null; window.IP_CANINSTALL=false;
  window.addEventListener("beforeinstallprompt",function(e){ e.preventDefault(); deferredPrompt=e; window.IP_CANINSTALL=true; window.dispatchEvent(new Event("ip-installchange")); });
  window.addEventListener("appinstalled",function(){ deferredPrompt=null; window.IP_CANINSTALL=false; window.dispatchEvent(new Event("ip-installchange")); });
  window.ipInstall=function(){ if(!deferredPrompt) return; deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; window.IP_CANINSTALL=false; window.dispatchEvent(new Event("ip-installchange")); }); };
  window.addEventListener("error",function(e){ if(!document.querySelector(".ip-shell, .ip-auth")) fatal(e.message||e.error||"erro"); });
  try{
    if(!window.React||!window.ReactDOM||!window.supabase) throw new Error("Bibliotecas não carregaram.");
    try{ document.documentElement.dataset.theme=localStorage.getItem("ip_theme")||"escuro"; }catch(e){ document.documentElement.dataset.theme="escuro"; }
    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(function(){}); }
  }catch(err){ fatal(err.stack||err.message||err); }
})();

</script>
